---
# ConfigMap with group authorization rules
apiVersion: v1
kind: ConfigMap
metadata:
  name: group-auth-config
  namespace: whoami
data:
  config.yaml: |
    apps:
      whoami:
        allowed_groups:
          - "admins"
          - "whoami-users"
      grafana:
        allowed_groups:
          - "admins"
          - "monitoring-team"
      prometheus:
        allowed_groups:
          - "admins"
          - "sre-team"

---
# Deployment for the group authorization service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: group-auth-service
  namespace: whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: group-auth-service
  template:
    metadata:
      labels:
        app: group-auth-service
    spec:
      containers:
        - name: group-auth
          image: harbor.yuriy-lab.cloud/library/authorization-header-checker:1.0.0
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: CONFIG_PATH
              value: /config/config.yaml
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
      volumes:
        - name: config
          configMap:
            name: group-auth-config

---
# Service for the group authorization service
apiVersion: v1
kind: Service
metadata:
  name: group-auth-service
  namespace: whoami
spec:
  selector:
    app: group-auth-service
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
