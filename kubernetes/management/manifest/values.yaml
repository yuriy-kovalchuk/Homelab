# Global settings for all apps
global:
  repoURL: harbor.yuriy-lab.cloud/charts
  targetRevision: 1.0.0

# App toggles for slow rollout
apps:
  whoami:
    enabled: true
    targetRevision: 1.0.0
    namespace: whoami
    labels:
      goldilocks.fairwinds.com/enabled: "true"
  
  # New apps being migrated
  yk-dns-manager:
    enabled: true
    targetRevision: 0.4.0
    namespace: yk-dns-manager
    labels:
      goldilocks.fairwinds.com/enabled: "true"
  
  vpa:
    enabled: true
    targetRevision: 1.0.0
    namespace: vpa
    labels:
      goldilocks.fairwinds.com/enabled: "true"
    ignoreDifferences:
      - group: gateway.networking.k8s.io
        kind: HTTPRoute
        jsonPointers:
          - /spec/parentRefs/0/group
          - /spec/parentRefs/0/kind
          - /spec/rules/0/backendRefs/0/group
          - /spec/rules/0/backendRefs/0/kind
          - /spec/rules/0/backendRefs/0/weight
  
  uptime-kuma:
    enabled: true
    targetRevision: 1.0.0
    namespace: uptime-kuma
    chart: uptimekuma-yk
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  # --- Infrastructure ---
  argo-cd:
    enabled: true
    targetRevision: 9.1.4
    namespace: argo-cd
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  cert-manager:
    enabled: true
    targetRevision: 1.0.0
    namespace: cert-manager
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  sealed-secrets:
    enabled: true
    targetRevision: 1.0.0
    namespace: sealed-secrets

  cilium:
    enabled: true
    targetRevision: 1.0.0
    namespace: kube-system
    labels:
      goldilocks.fairwinds.com/enabled: "true"
    ignoreDifferences:
      - group: apps
        kind: StatefulSet
        jsonPointers:
          - /spec/replicas
          - /spec/template/metadata/annotations
          - /spec/updateStrategy/rollingUpdate/partition
          - /status
          - /metadata/creationTimestamp
          - /spec/volumeClaimTemplates

  cilium-network-policies:
    enabled: true
    targetRevision: 1.0.0
    namespace: kube-system

  envoy-gateway:
    enabled: true
    targetRevision: 1.0.0
    namespace: envoy-gateway
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  external-secrets:
    enabled: true
    targetRevision: 1.0.0
    namespace: external-secrets
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  metrics-server:
    enabled: true
    targetRevision: 1.0.0
    namespace: metrics-server

  # --- Storage ---
  minio:
    enabled: true
    targetRevision: 1.0.0
    namespace: minio
    ignoreDifferences:
      - group: apps
        kind: StatefulSet
        jsonPointers:
          - /spec/template/metadata/annotations
          - /status
          - /metadata/creationTimestamp
          - /spec/volumeClaimTemplates

  longhorn:
    enabled: true
    targetRevision: 1.0.0
    namespace: longhorn-system
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  democratic-csi-nfs:
    enabled: true
    targetRevision: 1.0.0
    namespace: democratic-csi-nfs
    labels:
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/warn: privileged
      goldilocks.fairwinds.com/enabled: "true"

  democratic-csi-iscsi:
    enabled: true
    targetRevision: 1.0.0
    namespace: democratic-csi-iscsi
    labels:
      pod-security.kubernetes.io/audit: privileged
      pod-security.kubernetes.io/enforce: privileged
      pod-security.kubernetes.io/warn: privileged
      goldilocks.fairwinds.com/enabled: "true"

  cdi:
    enabled: true
    targetRevision: 1.0.0
    namespace: cdi
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  # --- Monitoring & Observability ---
  grafana:
    enabled: true
    targetRevision: 1.0.0
    namespace: grafana
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  k8s-monitoring:
    enabled: true
    targetRevision: 1.0.0
    namespace: k8s-monitoring
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  loki:
    enabled: true
    targetRevision: 1.0.0
    namespace: loki
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  mimir:
    enabled: true
    targetRevision: 1.0.0
    namespace: mimir
    ignoreDifferences:
      - group: apps
        kind: StatefulSet
        jsonPointers:
          - /spec/template/metadata/annotations
          - /spec/updateStrategy/rollingUpdate/partition
          - /status
          - /metadata/creationTimestamp
          - /spec/volumeClaimTemplates

  trivy:
    enabled: true
    targetRevision: 1.0.0
    namespace: trivy

  trivy-converter:
    enabled: true
    targetRevision: 1.0.0
    namespace: trivy-converter

  kyverno-reporter:
    enabled: true
    targetRevision: 1.0.0
    namespace: kyverno-reporter

  # --- Policy & Security ---
  kyverno:
    enabled: true
    targetRevision: 1.0.0
    namespace: kyverno
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  kyverno-policies:
    enabled: true
    targetRevision: 1.0.0
    namespace: kyverno

  cloudnative-pg:
    enabled: true
    targetRevision: 1.0.0
    namespace: cloudnative-pg
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  ulimit-tuner:
    enabled: true
    targetRevision: 1.0.0
    namespace: ulimit-tuner

  # --- Applications & Services ---
  authentik:
    enabled: true
    targetRevision: 1.0.0
    namespace: authentik
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  homepage:
    enabled: true
    targetRevision: 1.0.0
    namespace: homepage
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  headlamp:
    enabled: true
    targetRevision: 1.0.0
    namespace: headlamp
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  httpbin:
    enabled: true
    targetRevision: 1.0.0
    namespace: httpbin
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  dns-sync:
    enabled: true
    targetRevision: 1.0.0
    namespace: dns-sync
    labels:
      goldilocks.fairwinds.com/enabled: "true"
  
  kubevirt:
    enabled: true
    targetRevision: 1.0.0
    namespace: kubevirt
    labels:
      goldilocks.fairwinds.com/enabled: "true"

  kro:
    enabled: true
    targetRevision: 1.0.0
    namespace: kro

  ollama:
    enabled: true
    targetRevision: 1.0.0
    namespace: ollama

  # --- Utilities ---
  clean-pods:
    enabled: true
    targetRevision: 1.0.0
    namespace: clean-pods
    labels:
      goldilocks.fairwinds.com/enabled: "true"
