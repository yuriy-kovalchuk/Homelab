{{- $ns := include "tpl.namespace" . -}}
{{- range $s := .Values.statefulsets }}
{{- if or (not (hasKey $s "enabled")) $s.enabled }}
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ default (printf "%s-%s" (include "tpl.fullname" $) (default "sts" $s.name)) $s.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "tpl.labels" (dict "root" $ "extra" $s.labels) | nindent 4 }}
  annotations:
    {{- include "tpl.annotations" (dict "root" $ "extra" $s.annotations) | nindent 4 }}
spec:
  replicas: {{ default 1 $s.replicas }}
  serviceName: {{ default (include "tpl.fullname" $) $s.serviceName }}
  {{- if $s.podManagementPolicy }}
  podManagementPolicy: {{ $s.podManagementPolicy }}
  {{- end }}
  {{- if $s.updateStrategy }}
  updateStrategy: {{- toYaml $s.updateStrategy | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "tpl.selectorLabels" (dict "root" $ "name" (default (include "tpl.fullname" $) $s.name)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tpl.selectorLabels" (dict "root" $ "name" (default (include "tpl.fullname" $) $s.name)) | nindent 8 }}
      annotations:
        {{- include "tpl.annotations" (dict "root" $ "extra" (merge (default (dict) $.Values.common.podAnnotations) (default (dict) $s.podAnnotations))) | nindent 8 }}
    spec:
      {{- if $.Values.common.priorityClassName }}
      priorityClassName: {{ $.Values.common.priorityClassName }}
      {{- end }}
      {{- if or $.Values.serviceAccount.create $s.serviceAccountName }}
      serviceAccountName: {{ default (include "tpl.fullname" $) $s.serviceAccountName }}
      automountServiceAccountToken: {{ default false $.Values.serviceAccount.automount }}
      {{- end }}
      {{- if $.Values.common.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.common.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.common.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.tolerations }}
      tolerations:
        {{- toYaml $.Values.common.tolerations | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.affinity }}
      affinity:
        {{- toYaml $.Values.common.affinity | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml $.Values.common.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      {{- if or $.Values.common.podSecurityContext $s.podSecurityContext }}
      securityContext:
        {{- toYaml (default $.Values.common.podSecurityContext $s.podSecurityContext) | nindent 8 }}
      {{- end }}
      {{- if $s.volumes }}
      volumes:
        {{- toYaml $s.volumes | nindent 8 }}
      {{- end }}
      {{- if $s.extraInitContainers }}
      initContainers:
        {{- toYaml $s.extraInitContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ default (include "tpl.fullname" $) $s.name }}
          image: "{{ required "image.repository is required" $s.image.repository }}:{{ default "latest" $s.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" $s.image.pullPolicy }}
          {{- if $s.command }}
          command: {{- toYaml $s.command | nindent 10 }}
          {{- end }}
          {{- if $s.args }}
          args: {{- toYaml $s.args | nindent 10 }}
          {{- end }}
          {{- if or $s.envFrom $s.envFromSecrets $s.envFromConfigMaps }}
          envFrom:
            {{- /* Secrets listed as simple names or objects {name, optional} */}}
            {{- range $sref := (default (list) $s.envFromSecrets) }}
            - secretRef:
                name: {{- if kindIs "string" $sref -}}{{ $sref }}{{- else -}}{{ $sref.name }}{{- end }}
                {{- if and (not (kindIs "string" $sref)) (hasKey $sref "optional") }}
                optional: {{ $sref.optional }}
                {{- end }}
            {{- end }}
            {{- /* ConfigMaps listed as simple names or objects {name, optional} */}}
            {{- range $cmref := (default (list) $s.envFromConfigMaps) }}
            - configMapRef:
                name: {{- if kindIs "string" $cmref -}}{{ $cmref }}{{- else -}}{{ $cmref.name }}{{- end }}
                {{- if and (not (kindIs "string" $cmref)) (hasKey $cmref "optional") }}
                optional: {{ $cmref.optional }}
                {{- end }}
            {{- end }}
            {{- if $s.envFrom }}
            {{- toYaml $s.envFrom | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if $s.env }}
          env: {{- toYaml $s.env | nindent 10 }}
          {{- end }}
          {{- if $s.ports }}
          ports:
            {{- toYaml $s.ports | nindent 12 }}
          {{- end }}
          {{- if $s.livenessProbe }}
          livenessProbe: {{- toYaml $s.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $s.readinessProbe }}
          readinessProbe: {{- toYaml $s.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $s.startupProbe }}
          startupProbe: {{- toYaml $s.startupProbe | nindent 12 }}
          {{- end }}
          {{- if or $.Values.common.securityContext $s.securityContext }}
          securityContext:
            {{- toYaml (merge (default (dict) $.Values.common.securityContext) (default (dict) $s.securityContext)) | nindent 12 }}
          {{- end }}
          {{- if $s.resources }}
          resources: {{- toYaml $s.resources | nindent 12 }}
          {{- end }}
          {{- if $s.volumeMounts }}
          volumeMounts:
            {{- toYaml $s.volumeMounts | nindent 12 }}
          {{- end }}
        {{- if $s.extraContainers }}
        {{- toYaml $s.extraContainers | nindent 8 }}
        {{- end }}
  {{- if $s.volumeClaimTemplates }}
  volumeClaimTemplates:
    {{- range $v := $s.volumeClaimTemplates }}
    - metadata:
        name: {{ $v.name }}
      spec:
        accessModes: {{ toYaml $v.accessModes | nindent 8 }}
        {{- if $v.storageClassName }}
        storageClassName: {{ $v.storageClassName }}
        {{- end }}
        resources:
          requests:
            storage: {{ $v.size }}
    {{- end }}
  {{- end }}
{{- end }}
{{- end }}
