namespaceOverride: argo-cd

redis-ha:
  enabled: false

controller:
  replicas: 1

server:
  replicas: 2
  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
    hosts:
      - host: argocd.yuriy-lab.cloud
        paths:
          - path: /
            pathType: Prefix
    tls:
      - hosts:
          - argocd.yuriy-lab.cloud
        secretName: argocd-lab-tls

repoServer:
  replicas: 2

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: true


