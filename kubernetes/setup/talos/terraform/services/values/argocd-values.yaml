namespaceOverride: argo-cd

redis-ha:
  enabled: false

controller:
  replicas: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

server:
  replicas: 2
  ingress:
    enabled: true
    ingressClassName: "nginx"
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
    hostname: argocd.yuriy-lab.cloud
    path: /
    pathType: Prefix
    tls: true

repoServer:
  replicas: 2

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: true





