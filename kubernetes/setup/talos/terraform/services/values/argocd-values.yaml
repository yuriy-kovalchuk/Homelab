namespaceOverride: argo-cd

redis-ha:
  enabled: false

controller:
  replicas: 1

  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
      namespace: monitoring

server:
  replicas: 2


repoServer:
  replicas: 2

applicationSet:
  replicas: 2

configs:
  params:
    server.insecure: true

extraObjects:
  - apiVersion: gateway.networking.k8s.io/v1
    kind: HTTPRoute
    metadata:
      name: argo-route
      namespace: argo-cd
    spec:
      hostnames:
        - argocd.yuriy-lab.cloud
      parentRefs:
        - group: gateway.networking.k8s.io
          kind: Gateway
          name: main-gateway
          namespace: envoy-gateway-system
      rules:
        - backendRefs:
            - group: ''
              kind: Service
              name: argo-cd-argocd-server
              port: 80
              weight: 1
          matches:
            - path:
                type: PathPrefix
                value: /






