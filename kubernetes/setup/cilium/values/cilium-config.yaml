ipam:
  operator:
    clusterPoolIPv4PodCIDRList: [ "172.8.0.0/16"]
    clusterPoolIPv4MaskSize: 24

#k8sServiceHost: "$MAIN_MASTER_NODE"
k8sServicePort: 6443
kubeProxyReplacement: true

l2announcements:
  enabled: true

externalIPs:
  enabled: true

k8sClientRateLimit:
  qps: 50
  burst: 200

operator:
# replicas: 1  # Uncomment this if you only have one node
  rollOutPods: true

rollOutCiliumPods: true

routing-mode: "native"
bpf:
  masquerade: true

hubble:
  enabled: false
  relay:
    enabled: false
  ui:
    enabled: false
