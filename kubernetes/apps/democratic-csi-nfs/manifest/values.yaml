democratic-csi:
# 1. Unique name for this CSI instance
  csiDriver:
    name: "org.democratic-csi.nfs"

  # 2. StorageClass definition (How K8s sees the storage)
  storageClasses:
  - name: truenas-nfs
    defaultClass: false
    reclaimPolicy: Delete        # "Retain" if you want to keep data after deleting PVC
    volumeBindingMode: Immediate
    allowVolumeExpansion: true   # Enables resizing later
    parameters:
      fsType: nfs
    mountOptions:
      - noatime
      - nfsvers=4                # Use NFSv4 for better performance/locking

  # 3. TrueNAS Connection Details
  driver:
    existingConfigSecret: truenas-nfs-secret
    config:
      driver: freenas-api-nfs
