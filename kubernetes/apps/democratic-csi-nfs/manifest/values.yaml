democratic-csi:
# 1. Unique name for this CSI instance
  csiDriver:
    name: "org.democratic-csi.nfs"

  # 2. StorageClass definition (How K8s sees the storage)
  storageClasses:
  - name: truenas-nfs
    defaultClass: false
    reclaimPolicy: Delete        # "Retain" if you want to keep data after deleting PVC
    volumeBindingMode: Immediate
    allowVolumeExpansion: true   # Enables resizing later
    parameters:
      fsType: nfs
    mountOptions:
      - noatime
      - nfsvers=4                # Use NFSv4 for better performance/locking

  # 3. TrueNAS Connection Details
  driver:
    config:
      driver: freenas-api-nfs
      httpConnection:
        protocol: http           # Use https if you have SSL set up on TrueNAS
        host: 10.0.2.3      # YOUR TRUENAS IP
        port: 80
        apiKeySecret: truenas-credentials
        apiKeySecretKey: apiKey
        allowInsecure: true      # Set to true if using self-signed certs
      
      zfs:
        # This is the path to the dataset you created in TrueNAS
        datasetParentName: /mnt/tank-1/k8s/talos/nfs/volumes
        detachedSnapshotsDatasetParentName: /mnt/tank-1/k8s/talos/nfs/snapshots
        
        # Permission handling (Crucial for RWX)
        datasetPermissionsMode: "0777"
        datasetPermissionsUser: 0
        datasetPermissionsGroup: 0

      nfs:
        shareHost: 10.0.2.3  # YOUR TRUENAS IP
        shareAlloedNetworks: ["0.0.0.0/0"] # Restrict to your K8s node subnet
        shareMaprootUser: root
        shareMaprootGroup: wheel
