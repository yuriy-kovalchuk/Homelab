apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}
spec:
  template:
    spec:
      # POD LEVEL: Only keep fsGroup here
      securityContext:
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault

      initContainers:
        - name: init-config
          image: busybox:latest
          # REMOVED chmod: cp is enough because fsGroup handles ownership
          command: ['sh', '-c', 'cp /tmp/config/* /app/config/']
          volumeMounts:
            - name: config-source
              mountPath: /tmp/config
            - name: config-writable
              mountPath: /app/config
          securityContext:
            # Init container runs as root (privileged: false) to allow copying
            # but we keep it safe
            runAsUser: 0
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]

      containers:
        - name: {{ .Release.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            # APP LEVEL: App runs as non-root
            runAsUser: 10001
            runAsGroup: 10001
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config-writable
              mountPath: /app/config
            - name: logs
              mountPath: /app/config/logs

      volumes:
        - name: config-source
          configMap:
            name: {{ .Release.Name }}
        - name: config-writable
          emptyDir: {}
        - name: logs
          emptyDir: {}