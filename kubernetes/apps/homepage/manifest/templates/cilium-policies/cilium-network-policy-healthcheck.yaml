apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-health-checks"
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow Healthcheks"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: httpbin
  ingress:
    - fromEntities:
        - host        # Allows Kubelet on the same node
        - remote-node # Allows Kubelet/probes from other nodes
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP