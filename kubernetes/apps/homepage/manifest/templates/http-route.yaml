apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: homepage
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - group: gateway.networking.k8s.io	
      kind: Gateway
      name: main-gateway
      namespace: envoy-gateway-system

  hostnames:
    - "homepage.yuriy-lab.cloud"
    - "home.yuriy-lab.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - group: ''
          kind: Service
          weight: 1
          name: {{ .Release.Name }}
          port: {{ .Values.service.port }}
