apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
  namespace: homepage
  labels:
    app.kubernetes.io/name: homepage
spec:
  revisionHistoryLimit: 3
  replicas: 1
  strategy:
    type: RollingUpdate
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      serviceAccountName: homepage
      automountServiceAccountToken: true
      dnsPolicy: ClusterFirst
      enableServiceLinks: true
      volumes:
        - name: homepage-config
          configMap:
            name: homepage
        - name: generated-config
          emptyDir: {}   # New: where initContainer will write the final rendered config
        - name: logs
          emptyDir: {}
      initContainers:
        - name: config-renderer
          image: alpine:latest
          command:
            - /bin/sh
            - -c
            - |
              set -e
              mkdir -p /generated
              # List of files to process
              apk add --no-cache gettext # Ensure gettext is installed, which includes envsubst
              for file in services.yaml settings.yaml bookmarks.yaml widgets.yaml docker.yaml kubernetes.yaml; do
                if [ -f "/config/$file" ]; then
                  echo "Processing $file"
                  envsubst < "/config/$file" > "/generated/$file"
                fi
              done
              cp /config/custom.css /generated/custom.css
              cp /config/custom.js /generated/custom.js
          envFrom:
            - secretRef:
                name: homepage-secrets
          volumeMounts:
            - name: homepage-config
              mountPath: /config
            - name: generated-config
              mountPath: /generated
      containers:
        - name: homepage
          image: "ghcr.io/gethomepage/homepage:latest"
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: homepage-secrets
          env:
            - name: HOMEPAGE_ALLOWED_HOSTS
              value: homepage.yuriy-lab.cloud
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          volumeMounts:
            - mountPath: /app/config/custom.js
              name: generated-config
              subPath: custom.js
            - mountPath: /app/config/custom.css
              name: generated-config
              subPath: custom.css
            - mountPath: /app/config/bookmarks.yaml
              name: generated-config
              subPath: bookmarks.yaml
            - mountPath: /app/config/docker.yaml
              name: generated-config
              subPath: docker.yaml
            - mountPath: /app/config/kubernetes.yaml
              name: generated-config
              subPath: kubernetes.yaml
            - mountPath: /app/config/services.yaml
              name: generated-config
              subPath: services.yaml
            - mountPath: /app/config/settings.yaml
              name: generated-config
              subPath: settings.yaml
            - mountPath: /app/config/widgets.yaml
              name: generated-config
              subPath: widgets.yaml
            - mountPath: /app/config/logs
              name: logs
