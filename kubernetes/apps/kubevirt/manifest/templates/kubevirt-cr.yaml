
---
apiVersion: kubevirt.io/v1
kind: KubeVirt
metadata:
  name: kubevirt
  namespace: kubevirt
spec:
  certificateRotateStrategy: {}
  configuration:
    developerConfiguration:
      featureGates:
        - HostDevices
    imagePullPolicy: IfNotPresent
    permittedHostDevices:
      pciHostDevices:
        # AMD Radeon 780M GPU - verify with: lspci -nn | grep -i vga
        - pciVendorSelector: "1002:1900"
          resourceName: "amd.com/780m"
          externalResourceProvider: false
        # AMD HD Audio Controller (paired with GPU)
        - pciVendorSelector: "1002:1640"
          resourceName: "amd.com/780m-audio"
          externalResourceProvider: false
  customizeComponents: {}
  imagePullPolicy: IfNotPresent
  workloadUpdateStrategy: {}
