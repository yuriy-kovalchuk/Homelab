apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: httpbin-waypoint
  namespace: httpbin
  labels:
    # Optional: Labels to identify this as a Waypoint for your tooling
    app.kubernetes.io/name: istio-waypoint
spec:
  # Crucial: This field tells Istiod to deploy the Waypoint Envoy instance
  gatewayClassName: istio-waypoint
  listeners:
    # Defines the mTLS port the Waypoint listens on for mesh traffic
    - name: mesh
      port: 15008
      protocol: HBONE
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: httpbin
spec:
  # This tells Istio to attach this route to your waypoint gateway
  parentRefs:
    - name: httpbin-waypoint
  hostnames:
    - "httpbin-httpbingo.httpbin.svc.cluster.local" # Or whatever internal domain you use
  rules:
    - backendRefs:
        - name: httpbin-httpbingo # The name of your httpbin Service
          port: 80