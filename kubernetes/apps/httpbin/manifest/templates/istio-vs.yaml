apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: httpbin-route
  namespace: {{ .Release.Namespace }}
spec:
  parentRefs:
    - name: httpbin-istio-gw
  hostnames:
    - "httpbin.yuriy-lab.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: httpbin-httpbingo
          port: 80
