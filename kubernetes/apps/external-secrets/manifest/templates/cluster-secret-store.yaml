apiVersion: external-secrets.io/v1
kind: ClusterSecretStore
metadata:
  name: default-store
spec:
  provider:
    vault:
      server: "https://vault.yuriy-lab.cloud"
      path: "kubernetes"
      version: "v2"
      auth:
        tokenSecretRef:
          name: "vault-token"
          namespace: "external-secrets"
          key: "token"