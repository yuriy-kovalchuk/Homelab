apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello-world
  namespace: argo-cd
spec:
  project: default
  source:
    repoURL: "http://gitea-http.gitea.svc.cluster.local:3000/yuriy/Homelab"
    path: "kubernetes/apps/hello-world/deployment"       # path to the chart folder
    targetRevision: HEAD
    helm:
      releaseName: hello-world
  destination:
    server: https://kubernetes.default.svc
    namespace: default       # namespace where you want to deploy
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
      - CreateNamespace=true
