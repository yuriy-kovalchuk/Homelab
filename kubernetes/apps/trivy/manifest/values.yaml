trivy-operator:
  operator:
    scanJobTimeout: 1h
    scanJobsConcurrentLimit: 5
    infraAssessmentScannerEnabled: true
  serviceMonitor:
    enabled: true
    namespace: monitoring
  trivy:
    resources:
      requests:
        cpu: 10m
        memory: 100M
      limits:
        cpu: 200m
        memory: 800M
    server:
      # -- resources set trivy-server resource
      resources:
        requests:
          cpu: 20m
          memory: 512Mi
        limits:
          cpu: 200m
          memory: 1Gi
    storageSize: "1Gi"
    slow: false
    timeout: "3h"
    ignoreUnfixed: true
  service:
    headless: false
