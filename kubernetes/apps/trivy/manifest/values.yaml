trivy-operator:
  operator:
    scanJobTimeout: 1h
    scanJobsConcurrentLimit: 5
    infraAssessmentScannerEnabled: false
  serviceMonitor:
    enabled: true
    namespace: monitoring
  trivy:
    resources:
      requests:
        cpu: 10m
        memory: 100M
      limits:
        cpu: 200m
        memory: 800M
    server:
      # -- resources set trivy-server resource
      resources:
        requests:
          cpu: 20m
          memory: 512Mi
        limits:
          cpu: 200m
          memory: 1Gi
    storageSize: "1Gi"
    slow: false
    timeout: "3h"
    ignoreUnfixed: true
  service:
    headless: false
  nodeCollector:
    volumeMounts:
      - name: var-lib-etcd
        mountPath: /var/lib/etcd
        readOnly: true
      - name: var-lib-kubelet
        mountPath: /var/lib/kubelet
        readOnly: true
      - name: var-lib-kube-scheduler
        mountPath: /var/lib/kube-scheduler
        readOnly: true
      - name: var-lib-kube-controller-manager
        mountPath: /var/lib/kube-controller-manager
        readOnly: true
      - name: lib-systemd
        mountPath: /lib/systemd/
        readOnly: true
      - name: etc-kubernetes
        mountPath: /etc/kubernetes
        readOnly: true
      - name: etc-cni-netd
        mountPath: /etc/cni/net.d/
        readOnly: true

    # -- node-collector pod volumes definition for collecting config files information
    volumes:
      - name: var-lib-etcd
        hostPath:
          path: /var/lib/etcd
      - name: var-lib-kubelet
        hostPath:
          path: /var/lib/kubelet
      - name: var-lib-kube-scheduler
        hostPath:
          path: /var/lib/kube-scheduler
      - name: var-lib-kube-controller-manager
        hostPath:
          path: /var/lib/kube-controller-manager
      - name: lib-systemd
        hostPath:
          path: /lib/systemd
      - name: etc-kubernetes
        hostPath:
          path: /etc/kubernetes
      - name: etc-cni-netd
        hostPath:
          path: /etc/cni/net.d/

