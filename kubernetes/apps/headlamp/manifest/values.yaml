yk:
  httpRoute:
    parentRefs:
      - name: main-gateway
        namespace: envoy-gateway-system
    hostnames:
      - "headlamp.yuriy-lab.cloud"
    path:
      type: PathPrefix
      value: /
    backend:
      name: headlamp
      port: 80

headlamp:

  replicaCount: 3

  resources:
    requests:
      cpu: 10m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 512Mi

  pluginsManager:
    # -- Enable plugin manager
    enabled: true

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - labelSelector:
            matchExpressions:
              - key:  "app.kubernetes.io/name"
                operator: In
                values:
                  - headlamp
          topologyKey: "kubernetes.io/hostname"

  extraManifests:
    - |
      apiVersion: v1
      kind: Secret
      metadata:
        name: headlamp-admin-token
        namespace: headlamp
        annotations:
          kubernetes.io/service-account.name: headlamp
      type: kubernetes.io/service-account-token