apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "egress-node"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: headlamp
  egress:
    - toEntities:
        - host        # Allows Kubelet on the same node
        - remote-node # Allows Kubelet/probes from other nodes