traefik:
  ingressClass: # @schema additionalProperties: false
    isDefaultClass: false

  metrics:
    addInternals: true
    prometheus:
      serviceMonitor:
        enabled: true
        namespace: monitoring

  service:
    spec:
      loadBalancerIP: 10.0.8.110
    ipFamilyPolicy: SingleStack

  ingressRoute:
    dashboard:
      enabled: true
      entryPoints:
        - web
        - websecure

  experimental:
    plugins:
      checkheadersplugin:
        moduleName: "github.com/dkijkuit/checkheadersplugin"
        version: "v0.3.1"