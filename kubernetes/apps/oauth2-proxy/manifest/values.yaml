oauth2-proxy:
  config:
    clientID: "ffaf8c5b-273f-4656-81b1-0edaeeede85e"
    clientSecret: "c269bcbc-bd74-4e5e-b54a-c927ab867426"
    cookieSecret: "9qJLAxlZxfnAf2NutDFi9cKrhuD9Cecr"

  ingress:
    enabled: true
    className: nginx
    path: /
    pathType: ImplementationSpecific
    hosts:
      - oauth2-proxy.yuriy-lab.cloud
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
    tls:
      - secretName: chart-example-tls
        hosts:
          - oauth2-proxy.yuriy-lab.cloud

  extraArgs:
    provider: "entra-id"
    azure-tenant: "f6a43c35-26b3-4260-90e9-6d226459c179"
    oidc-issuer-url: "https://login.microsoftonline.com/f6a43c35-26b3-4260-90e9-6d226459c179/v2.0"
    scope: "openid email profile"
    oidc-groups-claim: "groups"          # tells oauth2-proxy to read group GUIDs
    set-xauthrequest: "true"
    set-authorization-header: "true"
    whitelist-domain: ".yuriy-lab.cloud"
