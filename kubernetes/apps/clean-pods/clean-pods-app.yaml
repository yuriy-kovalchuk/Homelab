apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: clean-failed-pods
  namespace: argo-cd
spec:
  project: infrastructure
  source:
    repoURL: git@github.com:yuriy-kovalchuk/Homelab.git
    targetRevision: HEAD
    path: kubernetes/apps/clean-pods/manifest
    helm:
      releaseName: clean-pods
  destination:
    server: https://kubernetes.default.svc
    namespace: clean-pods
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    managedNamespaceMetadata:
      labels:
        # This will enable Goldilocks/VPA for the entire namespace
        goldilocks.fairwinds.com/enabled: "true"

