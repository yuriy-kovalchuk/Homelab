apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "minio-network-policy"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: minio
  ingress:
    - fromEndpoints:
        - matchLabels:
            gateway.envoyproxy.io/owning-gateway-name: main-gateway
            gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
            io.kubernetes.pod.namespace: envoy-gateway-system
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9001"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app: minio-job
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: loki
            io.kubernetes.pod.namespace: loki
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: mimir
            io.kubernetes.pod.namespace: mimir
      authentication:
        mode: "required"
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: compactor
            io.kubernetes.pod.namespace: mimir
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: compactor
            io.kubernetes.pod.namespace: loki
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: ingester
            io.kubernetes.pod.namespace: mimir
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: store-gateway
            io.kubernetes.pod.namespace: mimir
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: index-gateway
            io.kubernetes.pod.namespace: loki
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: k8s-monitoring-alloy-metrics
            app.kubernetes.io/name: alloy-metrics
            io.kubernetes.pod.namespace: k8s-monitoring
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP