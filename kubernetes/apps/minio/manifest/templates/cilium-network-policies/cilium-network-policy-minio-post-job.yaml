apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "minio-post-job-network-policy"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: minio-post-job
  egress:
    - toEndpoints:
        - matchLabels:
            app: minio
      authentication:
        mode: "required"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP