minio:
  image:
    tag: RELEASE.2025-04-22T22-12-26Z-cpuv1

  mcImage:
    tag: RELEASE.2025-04-16T18-13-26Z-cpuv1


  existingSecret: minio-credentials

  replicas: 1
  mode: "standalone"


  persistence:
    size: 20Gi

  ingress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
    tls:
      - hosts:
          - minio.yuriy-lab.cloud
        secretName: minio-ingress-tls
    hosts:
      - minio.yuriy-lab.cloud
    path: "/"

  consoleIngress:
    enabled: true
    ingressClassName: nginx
    annotations:
      cert-manager.io/cluster-issuer: letsencrypt-dns
    tls:
      - hosts:
          - minio-console.yuriy-lab.cloud
        secretName: minio-console-ingress-tls
    hosts:
      - minio-console.yuriy-lab.cloud
    path: "/"

  resources:
    requests:
      memory: 100Mi
      cpu: 50m
    limits:
      memory: 1Gi
      cpu: 200m

  metrics:
    serviceMonitor:
      enabled: true
      includeNode: true
      namespace: monitoring

  buckets:
    - name: mimir-data
      policy: none
      purge: false
      versioning: false

    #   # Name of the bucket
    # - name: bucket1
    #   # Policy to be set on the
    #   # bucket [none|download|upload|public]
    #   policy: none
    #   # Purge if bucket exists already
    #   purge: false
    #   # set versioning for
    #   # bucket [true|false]
    #   versioning: false # remove this key if you do not want versioning feature
    #   # set objectlocking for
    #   # bucket [true|false] NOTE: versioning is enabled by default if you use locking
    #   objectlocking: false
    # - name: bucket2
    #   policy: none
    #   purge: false
    #   versioning: true
    #   # set objectlocking for
  #   # bucket [true|false] NOTE: versioning is enabled by default if you use locking
  #   objectlocking: false