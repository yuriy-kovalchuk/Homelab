## Global/common settings
nameOverride: ""
fullnameOverride: ""

namespace:
  create: true
  name: "__NAMESPACE__"
  labels: {}
  annotations: {}

common:
  labels: {}
  annotations: {}
  podAnnotations: {}
  imagePullSecrets: []
  priorityClassName: ""
  nodeSelector: {}
  tolerations: []
  affinity: {}
  topologySpreadConstraints: []
  podSecurityContext: {}
  securityContext: {}

serviceAccount:
  create: true
  name: ""
  automount: false
  annotations: {}
  imagePullSecrets: []

