{{- $ns := include "tpl.namespace" . -}}
{{- range $d := .Values.deployments }}
{{- if or (not (hasKey $d "enabled")) $d.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ default (printf "%s-%s" (include "tpl.fullname" $) (default "deploy" $d.name)) $d.name }}
  namespace: {{ $ns }}
  labels:
    {{- include "tpl.labels" (dict "root" $ "extra" $d.labels) | nindent 4 }}
  annotations:
    {{- include "tpl.annotations" (dict "root" $ "extra" $d.annotations) | nindent 4 }}
spec:
  {{- if $d.strategy }}
  strategy: {{- toYaml $d.strategy | nindent 4 }}
  {{- end }}
  replicas: {{ default 1 $d.replicas }}
  selector:
    matchLabels:
      {{- include "tpl.selectorLabels" (dict "root" $ "name" (default (include "tpl.fullname" $) $d.name)) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tpl.selectorLabels" (dict "root" $ "name" (default (include "tpl.fullname" $) $d.name)) | nindent 8 }}
        {{- if $d.podLabels }}
        {{- toYaml $d.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        {{- include "tpl.annotations" (dict "root" $ "extra" (merge (default (dict) $.Values.common.podAnnotations) (default (dict) $d.podAnnotations))) | nindent 8 }}
    spec:
      {{- if $.Values.common.priorityClassName }}
      priorityClassName: {{ $.Values.common.priorityClassName }}
      {{- end }}
      {{- if or $.Values.serviceAccount.create $d.serviceAccountName }}
      serviceAccountName: {{ default (include "tpl.fullname" $) $d.serviceAccountName }}
      automountServiceAccountToken: {{ default false $.Values.serviceAccount.automount }}
      {{- end }}
      {{- if $.Values.common.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml $.Values.common.imagePullSecrets | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.nodeSelector }}
      nodeSelector:
        {{- toYaml $.Values.common.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.tolerations }}
      tolerations:
        {{- toYaml $.Values.common.tolerations | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.affinity }}
      affinity:
        {{- toYaml $.Values.common.affinity | nindent 8 }}
      {{- end }}
      {{- if $.Values.common.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml $.Values.common.topologySpreadConstraints | nindent 8 }}
      {{- end }}
      {{- if or $.Values.common.podSecurityContext $d.podSecurityContext }}
      securityContext:
        {{- toYaml (default $.Values.common.podSecurityContext $d.podSecurityContext) | nindent 8 }}
      {{- end }}
      {{- if $d.volumes }}
      volumes:
        {{- toYaml $d.volumes | nindent 8 }}
      {{- end }}
      {{- if $d.extraInitContainers }}
      initContainers:
        {{- toYaml $d.extraInitContainers | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ default (include "tpl.fullname" $) $d.name }}
          image: "{{ required "image.repository is required" $d.image.repository }}:{{ default "latest" $d.image.tag }}"
          imagePullPolicy: {{ default "IfNotPresent" $d.image.pullPolicy }}
          {{- if $d.command }}
          command: {{- toYaml $d.command | nindent 10 }}
          {{- end }}
          {{- if $d.args }}
          args: {{- toYaml $d.args | nindent 10 }}
          {{- end }}
          {{- if or $d.envFrom $d.envFromSecrets $d.envFromConfigMaps }}
          envFrom:
            {{- /* Secrets listed as simple names or objects {name, optional} */}}
            {{- range $s := (default (list) $d.envFromSecrets) }}
            - secretRef:
                name: {{ if kindIs "string" $s }}{{ $s }}{{ else }}{{ $s.name }}{{ end }}
                {{- if and (not (kindIs "string" $s)) (hasKey $s "optional") }}
                optional: {{ $s.optional }}
                {{- end }}
            {{- end }}
            {{- /* ConfigMaps listed as simple names or objects {name, optional} */}}
            {{- range $c := (default (list) $d.envFromConfigMaps) }}
            - configMapRef:
                name: {{ if kindIs "string" $c }}{{ $c }}{{ else }}{{ $c.name }}{{ end }}
                {{- if and (not (kindIs "string" $c)) (hasKey $c "optional") }}
                optional: {{ $c.optional }}
                {{- end }}
            {{- end }}
            {{- if $d.envFrom }}
            {{- toYaml $d.envFrom | nindent 12 }}
            {{- end }}
          {{- end }}
          {{- if $d.env }}
          env: {{- toYaml $d.env | nindent 10 }}
          {{- end }}
          {{- if $d.ports }}
          ports:
            {{- toYaml $d.ports | nindent 12 }}
          {{- end }}
          {{- if $d.livenessProbe }}
          livenessProbe: {{- toYaml $d.livenessProbe | nindent 12 }}
          {{- end }}
          {{- if $d.readinessProbe }}
          readinessProbe: {{- toYaml $d.readinessProbe | nindent 12 }}
          {{- end }}
          {{- if $d.startupProbe }}
          startupProbe: {{- toYaml $d.startupProbe | nindent 12 }}
          {{- end }}
          {{- if or $.Values.common.securityContext $d.securityContext }}
          securityContext:
            {{- toYaml (merge (default (dict) $.Values.common.securityContext) (default (dict) $d.securityContext)) | nindent 12 }}
          {{- end }}
          {{- if $d.resources }}
          resources: {{- toYaml $d.resources | nindent 12 }}
          {{- end }}
          {{- if $d.volumeMounts }}
          volumeMounts:
            {{- toYaml $d.volumeMounts | nindent 12 }}
          {{- end }}
        {{- if $d.extraContainers }}
        {{- toYaml $d.extraContainers | nindent 8 }}
        {{- end }}
{{- end }}
{{- end }}
