apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: opnsense-credentials
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    name: default-store
    kind: ClusterSecretStore
  target:
    name: opnsense-credentials
  data:
    - secretKey: OPNSENSE_SECRET
      remoteRef:
        key: prd/opnsense
        property: secret
        conversionStrategy: Default
        decodingStrategy: None
        metadataPolicy: None

