apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cluster-authentik-credentials
  namespace: {{ .Release.Namespace }}
spec:
  secretStoreRef:
    name: default-store
    kind: ClusterSecretStore
  target:
    name: cluster-authentik-user
  data:
    - secretKey: username
      remoteRef:
        key: prd/authentik
        property: pg_user
    - secretKey: password
      remoteRef:
        key: prd/authentik
        property: pg_password

