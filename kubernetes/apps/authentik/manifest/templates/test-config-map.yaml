apiVersion: v1
kind: ConfigMap
metadata:
  name: my-app-provider
  namespace: authentik  # <-- adjust to your namespace
  labels:
    app.kubernetes.io/name: authentik
    app.kubernetes.io/component: blueprints
data:
  provider-application.yaml: |
    version: 1
    metadata:
      name: my-company-app-provider
      labels:
        goauthentik_blueprint: "1"
    entries:
      # --- OIDC Provider ---
      - id: my-oidc-provider
        model: authentik_providers_oidc.provider
        create: true
        update: true
        fields:
          name: "My OIDC Provider"
          slug: "my-oidc-provider"
          client_id: "my-client-id"
          client_secret: "my-client-secret"
          authorization_flow: "default-provider-authorization-implicit-consent"
          redirect_uris:
            - "https://app.example.com/auth/callback"
          property_mappings:
            - !Find [authentik_core.propertymapping, default-mapping-openid-email]
            - !Find [authentik_core.propertymapping, default-mapping-openid-profile]
          signing_key: !Find [authentik_crypto.certificatekeypair, authentik Self-signed Certificate]
    
      # --- Application ---
      - id: my-app
        model: authentik_core.application
        create: true
        update: true
        fields:
          name: "Example App"
          slug: "example-app"
          provider: !KeyOf my-oidc-provider
          launch_url: "https://app.example.com/"
          open_in_new_tab: true

