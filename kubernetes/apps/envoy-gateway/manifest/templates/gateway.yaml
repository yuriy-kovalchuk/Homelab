{{- range .Values.yk.gateways }}
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: {{ .name }}-gateway
  namespace: {{ $.Release.Namespace | default "envoy-gateway-system" }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-dns
spec:
  gatewayClassName: {{ .name }}-class
  listeners:
{{ .listeners | toYaml | indent 4 }}
---
{{- end }}