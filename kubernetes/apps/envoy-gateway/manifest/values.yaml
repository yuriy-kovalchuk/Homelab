yk:
  gateways:
    - name: main
      replicas: 3
      envoyProxy:
        service:
          type: LoadBalancer
          loadBalancerIP: 10.0.8.105
        deployment:
          envoy:
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                cpu: 100m
                memory: 512Mi

      listeners:
        - name: https-grafana
          protocol: HTTPS
          port: 443
          hostname: "grafana.yuriy-lab.cloud"
          allowedRoutes:
            namespaces:
              from: All
          tls:
            mode: Terminate
            certificateRefs:
              - kind: Secret
                group: ""
                name: grafana-gw-tls-cert

        - name: https-kuma
          protocol: HTTPS
          port: 443
          hostname: "kuma.yuriy-lab.cloud"
          allowedRoutes:
