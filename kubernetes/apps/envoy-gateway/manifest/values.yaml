gateway-helm:

  deployment:
    replicas: 3

  pod:
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            "app.kubernetes.io/instance": envoy-gateway
            "app.kubernetes.io/name": gateway-helm

  podDisruptionBudget:
    minAvailable: 1

  hpa:
    enabled: false
    minReplicas: 1
    maxReplicas: 5
