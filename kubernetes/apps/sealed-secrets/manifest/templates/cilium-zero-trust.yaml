# 1. BASELINE: Global Default Deny (Ingress & Egress)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "zero-trust-baseline"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {} # Target ALL pods in the namespace
  # Egress Lockdown: Deny all internet, allow ONLY internal DNS
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"

---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-health-checks"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {} # Apply to all pods in the namespace
  ingress:
    - fromEntities:
        - host        # Allows Kubelet on the same node
        - remote-node # Allows Kubelet/probes from other nodes
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# 2. INGRESS: Allow Metrics scraping by Alloy (Cross-Namespace)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-metrics-scraping"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: sealed-secrets # Or use {} to allow Gateway to all pods in this NS
  ingress:
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: k8s-monitoring-alloy-metrics
            app.kubernetes.io/name: alloy-metrics
            io.kubernetes.pod.namespace: k8s-monitoring
      authentication:
        mode: "required" # This triggers the SPIRE mTLS check
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP