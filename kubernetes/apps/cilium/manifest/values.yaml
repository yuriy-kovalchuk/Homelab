yk:
  httpRoutes:
    - parentRefs:
        - name: main-gateway
          namespace: envoy-gateway-system
      name: hubble
      securityPolicy: true
      hostnames:
        - "hubble.yuriy-lab.cloud"
      path:
        type: PathPrefix
        value: /
      backend:
        name: hubble-ui
        port: 80


cilium:
  k8sServiceHost: 10.0.8.2
  k8sServicePort: 6443
  ipam:
    mode: kubernetes
  kubeProxyReplacement: true

  securityContext:
    capabilities:
      ciliumAgent:
        - CHOWN
        - KILL
        - NET_ADMIN
        - NET_RAW
        - IPC_LOCK
        - SYS_ADMIN
        - SYS_RESOURCE
        - DAC_OVERRIDE
        - FOWNER
        - SETGID
        - SETUID
      cleanCiliumState:
        - NET_ADMIN
        - SYS_ADMIN
        - SYS_RESOURCE

  cgroup:
    autoMount:
      enabled: false
    hostRoot: /sys/fs/cgroup

  l2announcements:
    enabled: true

  externalIPs:
    enabled: true

  k8sClientRateLimit:
    qps: 50
    burst: 200

  operator:
    replicas: 3
    rollOutPods: true
    prometheus:
      enabled: true

  encryption:
    # -- Enable transparent network encryption.
    enabled: true
    type: wireguard

  rollOutCiliumPods: true

  routing-mode: "native"

  authentication:
    mutual:
      spire:
        enabled: true
        install:
          namespace: cilium-spire
          existingNamespace: true
          #        agent:
          #          config:
          #            agent:
          #              socket_path: /run/spire/sockets/spire-agent.sock
          server:
            #          initContainers:
            #            - command:
            #                - /bin/sh
            #                - -c
            #                - |
            #                  chown -R 1000:1000 /run/spire/data
            #                  chown -R 1000:1000 /tmp/spire-server
            #              image: docker.io/library/busybox:1.37.0
            #              imagePullPolicy: IfNotPresent
            #              name: chown
            #              securityContext:
            #                runAsGroup: 0
            #                runAsUser: 0
            #              volumeMounts:
            #                - mountPath: /run/spire/data
            #                  name: spire-data
            #                - mountPath: /tmp/spire-server/private
            #                  name: spire-server-socket
            securityContext:
              runAsGroup: 0
              runAsUser: 0
            dataStorage:
              enabled: true
              size: 1Gi
              accessMode: ReadWriteOnce
              storageClass: longhorn

  prometheus:
    enabled: true
    serviceMonitor:
      enabled: true

  l7Proxy: true

  envoyConfig:
    enabled: true

  loadBalancer:
    l7:
      backend: envoy

  hubble:
    enabled: true
    metrics:
      enableOpenMetrics: true
      serviceMonitor:
        enabled: true
      dashboards:
        enabled: true
      enabled:
        - "policy:sourceContext=app|workload-name|pod|reserved-identity;destinationContext=app|workload-name|pod|dns|reserved-identity;labelsContext=source_namespace,destination_namespace"
    #  metrics:
    #    enabled:
    #      - dns:query;ignoreAAAA
    #      - drop:sourceContext=identity;destinationContext=identity
    #      - tcp
    #      - flow
    #      - icmp
    #      - 'httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction;sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity'
    #    enableOpenMetrics: true
    #    dashboards:
    #      enabled: true
    #      namespace: grafana
    #      annotations:
    #        grafana_folder: "Hubble"

    relay:
      enabled: true
    ui:
      enabled: true

  #cni:
  #  exclusive: false # REQUIRED: Allow Istio CNI chaining
  #
  #socketLB:
  #  # REQUIRED: Prevent Cilium from bypassing Istio traffic capture
  #  hostNamespaceOnly: true

  bpf:
    # REQUIRED: Disable BPF masquerade to allow Istio health checks to pass
    masquerade: true

