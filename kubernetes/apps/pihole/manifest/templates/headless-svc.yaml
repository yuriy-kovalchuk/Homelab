apiVersion: v1
kind: Service
metadata:
  name: pihole-v6-headless
  namespace: pihole-v6
spec:
  clusterIP: None  # Headless service for pod discovery
  selector:
    app: pihole-v6
  ports:
    - name: dns-udp
      port: 53
      protocol: UDP
    - name: dns-tcp
      port: 53
      protocol: TCP
