apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: pihole-v6
  namespace: pihole-v6
spec:
  serviceName: pihole-v6
  replicas: 2  # Adjust as needed
  selector:
    matchLabels:
      app: pihole-v6
  template:
    metadata:
      labels:
        app: pihole-v6
    spec:
      containers:
        - name: pihole
          image: pihole/pihole:2025.04.0
          securityContext:
            capabilities:
              add:
                - NET_BIND_SERVICE  # Allow binding to privileged ports like 53
          ports:
            - containerPort: 53  # DNS UDP
              protocol: UDP
            - containerPort: 53  # DNS TCP
              protocol: TCP
            - containerPort: 80  # Web UI
              protocol: TCP
          env:
            - name: TZ
              value: "UTC+1"
            - name: FTLCONF_webserver_api_password
              valueFrom:
                secretKeyRef:
                  name: pihole-v6-password
                  key: PIHOLE_WEB_PASSWORD
            - name: WEBPASSWORD
              valueFrom:
                secretKeyRef:
                  name: pihole-v6-password
                  key: PIHOLE_WEB_PASSWORD
            - name: FTLCONF_dns_listeningMode
              value: "all"
          volumeMounts:
            - name: pihole-config
              mountPath: /etc/pihole
  volumeClaimTemplates:
    - metadata:
        name: pihole-config
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi  # Adjust as needed for your use case


