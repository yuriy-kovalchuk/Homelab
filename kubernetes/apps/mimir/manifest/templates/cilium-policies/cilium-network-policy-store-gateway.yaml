apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-store-gateway-to-access-minio"
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow Store Gateway to access Minio"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: store-gateway
      app.kubernetes.io/instance: mimir
  egress:
    - toEndpoints:
        - matchLabels:
            app: minio
            io.kubernetes.pod.namespace: minio
      authentication:
        mode: "required"