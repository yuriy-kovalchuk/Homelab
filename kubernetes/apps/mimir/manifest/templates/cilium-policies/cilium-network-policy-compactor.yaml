apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-compactor-to-access-minio"
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow Compactor to access Minio"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: compactor
      app.kubernetes.io/instance: mimir
  egress:
    - toEndpoints:
        - matchLabels:
            app: minio
            io.kubernetes.pod.namespace: minio
      authentication:
        mode: "required"