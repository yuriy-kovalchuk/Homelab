# PostgreSQL Cluster
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pg-cluster-netbox
spec:
  description: "Netbox pg cluster"
  imageName: ghcr.io/cloudnative-pg/postgresql:15.4
  instances: 1
  startDelay: 300
  stopDelay: 300
  primaryUpdateStrategy: unsupervised

  # PostgreSQL configuration
  postgresql:
    parameters:
      shared_buffers: 256MB
      pg_stat_statements.max: '10000'
      pg_stat_statements.track: all
      auto_explain.log_min_duration: '10s'
    # Allow all users to connect from any IP
    pg_hba:
      - host all all 0.0.0.0/0 md5

  # Bootstrap app user and database
  bootstrap:
    initdb:
      database: netbox
      owner: netbox
      secret:
        name: cluster-netbox-user

  # Storage configuration
  storage:
    size: 5Gi

  # Resource requests/limits
  resources:
    requests:
      memory: "512Mi"
      cpu: "100m"
    limits:
      memory: "1Gi"
      cpu: "500m"
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: cnpg-netbox-cluster-monitor
  namespace: monitoring
  labels:
    # IMPORTANT: If your Prometheus CRD has a specific selector (e.g., release: prometheus),
    # you MUST add that label here for discovery to work.
    cnpg.io/cluster-name: pg-cluster-netbox
spec:
  # 1. Namespace Selector
  # This tells the PodMonitor to ONLY look for pods in the 'authentik' namespace.
  # This is crucial for cross-namespace scraping.
  namespaceSelector:
    matchNames:
      - netbox

  # 2. Pod Selector
  # This selects the specific CloudNativePG pods using the 'cnpg.io/cluster' label
  # which is present on all your database instances.
  selector:
    matchLabels:
      cnpg.io/cluster: pg-cluster-netbox

  # 3. Metrics Endpoints
  # This specifies how to scrape the metrics from the selected pods.
  podMetricsEndpoints:
    - port: metrics # This is the port NAME (9187/TCP) defined in your Pod spec.
      path: /metrics # The standard path for the postgres exporter.
      interval: 30s # Recommended scraping interval.
