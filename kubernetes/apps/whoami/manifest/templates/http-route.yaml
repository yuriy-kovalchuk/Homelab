{{- range .Values.yk.httpRoutes }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .name }}-route
  namespace: {{ $.Release.Namespace }}
spec:
  parentRefs:
  {{- range .parentRefs }}
    - name: {{ .name }}
      group: gateway.networking.k8s.io
      kind: Gateway
      namespace: {{ .namespace }}
  {{- end }}
  hostnames:
  {{- range .hostnames }}
    - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .path.type | default "PathPrefix" }}
            value: {{ .path.value | default "/" }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
          group: ''
          kind: Service
          weight: 1
---
{{- end }}