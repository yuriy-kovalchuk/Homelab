apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: whoami-route
  namespace: whoami
spec:
  parentRefs:
    - name: whoami-gateway
      namespace: whoami
  hostnames:
    - "whoami.istio.yuriy-lab.cloud"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: whoami
          port: 80