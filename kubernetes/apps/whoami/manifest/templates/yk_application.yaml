apiVersion: kro.run/v1alpha1
kind: YKApplication
metadata:
  name: whoami
  namespace: {{ .Release.Namespace }}
spec:
  name: whoami
  namespace: {{ .Release.Namespace }}
  image: traefik/whoami:v1.11
  replicas: 3
  applicationType: deployment
  port: 80  # whoami listens on port 80
  
  labels:
    app: whoami
  
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "100m"
      memory: "128Mi"
  
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
    runAsGroup: 10001
    fsGroup: 10001
    seccompProfile:
      type: RuntimeDefault
  
  httpRoute:
    enabled: true
    hostname: "whoami.yuriy-lab.cloud"
    gatewayRef:
      name: "main-gateway"
      namespace: "envoy-gateway-system"

  service:
    type: ClusterIP
    port: 80
