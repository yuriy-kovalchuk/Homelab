---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: whoami
  namespace: whoami
spec:
  replicas: 2
  selector:
    matchLabels:
      app: whoami
  template:
    metadata:
      labels:
        app: whoami
      annotations:
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - image: containous/whoami
          imagePullPolicy: Always
          name: whoami