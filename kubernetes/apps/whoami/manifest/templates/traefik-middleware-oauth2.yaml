apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: whoami
spec:
  forwardAuth:
    address: http://whoami-oauth2-proxy.whoami.svc.cluster.local
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - Authorization
    authRequestHeaders:
      - X-Forwarded-Method
      - X-Forwarded-Proto
      - X-Forwarded-Host
      - X-Forwarded-Uri
      - X-Forwarded-For
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-errors
  namespace: whoami
spec:
  errors:
    status:
      - "401"
    query: /oauth2/sign_in?rd={url}
    service:
      name: whoami-oauth2-proxy
      port: 80
---
# Chain both middlewares together
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-chain
  namespace: whoami
spec:
  chain:
    middlewares:
      - name: oauth2-auth