---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: whoami
spec:
  forwardAuth:
    address: http://whoami-oauth2-proxy.whoami.svc.cluster.local/oauth2/
    trustForwardHeader: true
    authResponseHeaders:
      - "X-Auth-Request-User"
      - "X-Auth-Request-Email"
      - "X-Auth-Request-Groups"
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: require-admin-group
  namespace: whoami
spec:
  plugin:
    validate-headers:
      error:
        statuscode: 403
        message: "Forbidden: Admin or Developer group required"
      headers:
        - name: X-Auth-Request-Groups
          matchtype: one
          values:
            - "admins"
            - "developers"
          contains: true
          required: true
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-chain
  namespace: whoami
spec:
  chain:
    middlewares:
#      - name: oauth2-errors
      - name: oauth2-auth
      - name: require-admin-group
