apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: whoami
spec:
  forwardAuth:
    address: http://whoami-oauth2-proxy.whoami.svc.cluster.local/oauth2/auth
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-Email
      - X-Auth-Request-Groups
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-errors
  namespace: whoami
spec:
  errors:
    status:
      - "401"
    query: "/oauth2/start?rd={url}"
    service:
      name: whoami-oauth2-proxy
      port: 80
---
# Chain both middlewares together
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-chain
  namespace: whoami
spec:
  chain:
    middlewares:
      - name: oauth2-errors
      - name: oauth2-auth