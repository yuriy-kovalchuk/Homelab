apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-errors
  namespace: whoami
spec:
  errors:
    status:
      - "401"
    query: "/oauth2/start?rd={url}"
    service:
      name: whoami-oauth2-proxy
      port: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-auth
  namespace: whoami
spec:
  forwardAuth:
    address: https://oauth2.yuriy-lab.cloud/oauth2/start
    trustForwardHeader: true
    authResponseHeaders:
      - X-Auth-Request-User
      - X-Auth-Request-Email
      - X-Auth-Request-Preferred-Username
      - Authorization
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: oauth2-chain
  namespace: whoami
spec:
  chain:
    middlewares:
      - name: oauth2-auth