yk:
  httpRoutes:
    - parentRefs:
        - name: main-gateway
          namespace: envoy-gateway-system
      name: alloy
      hostnames:
        - "alloy.yuriy-lab.cloud"
      path:
        type: PathPrefix
        value: /
      backend:
        name: alloy
        port: 12345

alloy:
  alloy:
    enableReporting: false
    configMap:
      content: |
        logging {
          level  = "info"
          format = "logfmt"
        }
        
        // Kubernetes Discovery Components (Used by the operator internally)
        discovery.kubernetes "pods" {
          role = "pod"
        }
        
        discovery.kubernetes "nodes" {
          role = "node"
        }
        
        discovery.kubernetes "services" {
          role = "service"
        }
        
        discovery.kubernetes "endpoints" {
          role = "endpoints"
        }
        
        discovery.kubernetes "endpointslices" {
          role = "endpointslice"
        }
        
        discovery.kubernetes "ingresses" {
          role = "ingress"
        }
        
        // -------------------------------------------------------------
        // Mimir Remote Write Destination
        // -------------------------------------------------------------

        prometheus.remote_write "mimir" {
          endpoint {
            url = "http://mimir-distributor.mimir.svc.cluster.local:8080/api/v1/push"
          }
        
          // 💡 MANDATORY FIX: Add a unique label (like 'cluster') to all metrics.
          // This is often required by Grafana dashboards to query across clusters.
          external_labels = {
            cluster = "my-k8s-cluster-name"
          }
        }
        
        // Watches ALL namespaces
        prometheus.operator.servicemonitors "k8s_monitors" {
          // All metrics from all ServiceMonitors will be forwarded here.
          forward_to = [prometheus.remote_write.mimir.receiver]
        
          // This block applies relabeling rules *after* scraping metrics,
          // which is exactly where the kube-prometheus-stack applies them.
          metric_relabeling_configs {
            // 1. 🔑 KSM Namespace Fix:
            // Moves the 'namespace' label (used internally by Prometheus)
            // to 'exported_namespace' for Kube-State-Metrics (KSM) to match the
            // default Prometheus-stack dashboards.
            rule {
              action        = "replace"
              source_labels = ["__name__", "namespace"]
              regex         = "(kube_.*);(.+)"
              target_label  = "exported_namespace"
              replacement   = "$2"
            }
        
            // 2. 🔑 KSM Pod Label Promotion (Labelmap):
            // Takes Kubernetes pod metadata labels (e.g., __meta_kubernetes_pod_label_app)
            // and promotes them to official Prometheus labels (e.g., app).
            // This is vital for selectors like {app="kube-state-metrics"}.
            rule {
              action = "labelmap"
              regex  = "__meta_kubernetes_pod_label_(.+)"
            }
        
            // 3. ⚠️ Critical Drop Rules Placeholder:
            // You MUST inspect your 'out.yaml' for any 'metricRelabelings' with action: drop
            // and replicate them here. Ignoring this step can lead to massive cost increase
            // due to high-cardinality metrics (like cAdvisor or apiserver metrics) being sent.
            /*
            rule {
              action        = "drop"
              source_labels = ["__name__"]
              // EXAMPLE: Drop the 'up' metric from all scraped targets
              regex         = "up|scrape_series_added"
            }
            */
          }
        }
        
        // -------------------------------------------------------------
        // Alloy Self-Metrics (Monitoring Alloy itself)
        // -------------------------------------------------------------

        prometheus.exporter.self "self_metrics" {}

        prometheus.scrape "self_scrape" {
          targets    = prometheus.exporter.self.self_metrics.targets
          forward_to = [prometheus.remote_write.mimir.receiver]
        }







  extraObjects:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: alloy
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
#  serviceMonitor:
#    enabled: false

prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      namespace: "alloy"
      jobLabel: "app.kubernetes.io/name"


kube-state-metrics:


  prometheus:
    monitor:
      enabled: true