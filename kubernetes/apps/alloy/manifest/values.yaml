yk:
  httpRoutes:
    - parentRefs:
        - name: main-gateway
          namespace: envoy-gateway-system
      name: alloy
      hostnames:
        - "alloy.yuriy-lab.cloud"
      path:
        type: PathPrefix
        value: /
      backend:
        name: alloy
        port: 12345

alloy:
  alloy:
    enableReporting: false
    configMap:
      content: |
        logging {
          level  = "info"
          format = "logfmt"
        }
        
        // 1. Service Monitor Discovery
        // Scrapes targets defined by ServiceMonitor CRDs in the cluster
        prometheus.operator.servicemonitors "k8s_monitors" {
          // Forward to the relabeling component first, not directly to Mimir
          forward_to = [prometheus.relabel.k8s_dashboard_fixes.receiver]
        }

        // 2. Relabeling for Dashboard Compatibility
        // This component applies the rules usually provided by kube-prometheus-stack
        prometheus.relabel "k8s_dashboard_fixes" {
          forward_to = [prometheus.remote_write.mimir.receiver]
        
          // Rule 1: Add a 'cluster' label (Required by most K8s dashboards)
          // Replace "my-cluster" with your actual cluster name
          rule {
            action       = "replace"
            target_label = "cluster"
            replacement  = "my-cluster"
          }

          // Rule 2: Fix 'namespace' collision for Kube State Metrics (KSM)
          // Dashboards expect the monitored object's namespace to be in 'exported_namespace'
          // if it conflicts with the scrape target's namespace.
          rule {
            action        = "replace"
            source_labels = ["namespace"]
            target_label  = "exported_namespace"
            // Only apply this to KSM metrics (which typically start with kube_)
            regex         = "(kube_.*)"
          }
        
          // Rule 3: Promote Pod labels to metric labels
          // This allows you to filter by 'app', 'component', etc. in dashboards.
          // It maps __meta_kubernetes_pod_label_<name> to <name>
          rule {
            action = "labelmap"
            regex  = "__meta_kubernetes_pod_label_(.+)"
          }
        
          // Rule 4: Ensure 'job' label matches what dashboards often expect
          // (Optional: Adjust regex/replacement if your ServiceMonitors use different job names)
          rule {
            action        = "replace"
            source_labels = ["job"]
            regex         = ".*(kube-state-metrics|node-exporter).*"
            target_label  = "job"
            replacement   = "$1"
          }
        }

        // 3. Mimir Remote Write Destination
        prometheus.remote_write "mimir" {
          endpoint {
            url = "http://mimir-distributor.mimir.svc.cluster.local:8080/api/v1/push"
          }
        }
        
        // 4. Alloy Self-Metrics
        prometheus.exporter.self "self_metrics" {}

        prometheus.scrape "self_scrape" {
          targets    = prometheus.exporter.self.self_metrics.targets
          forward_to = [prometheus.remote_write.mimir.receiver]
        }





  extraObjects:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: alloy
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged
#  serviceMonitor:
#    enabled: false

prometheus-node-exporter:
  prometheus:
    monitor:
      enabled: true
      namespace: "alloy"
      jobLabel: "app.kubernetes.io/name"


kube-state-metrics:


  prometheus:
    monitor:
      enabled: true