apiVersion: v1
kind: Service
metadata:
  name: __APP_NAME__
  namespace: __NAMESPACE__
  labels:
    app.kubernetes.io/name: __APP_NAME__
    app.kubernetes.io/instance: __APP_NAME__
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: __APP_NAME__
    app.kubernetes.io/instance: __APP_NAME__
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      protocol: TCP
