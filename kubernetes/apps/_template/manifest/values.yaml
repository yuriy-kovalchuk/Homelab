# Default values for myapp.
replicaCount: 1

image:
  repository: ghcr.io/your-org/myapp
  tag: "latest"
  pullPolicy: IfNotPresent

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

podAnnotations: {}

resources: {}

nodeSelector: {}

tolerations: []

affinity: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
  hosts:
    - host: myapp.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

env: []
  # - name: EXAMPLE
#   value: "true"
