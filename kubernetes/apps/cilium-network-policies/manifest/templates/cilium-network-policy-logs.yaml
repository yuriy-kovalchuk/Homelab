apiVersion: "cilium.io/v2"
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: "allow-egress-alloy-logs"
spec:
  description: "Allow Alloy"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: k8s-monitoring-alloy-logs
      app.kubernetes.io/name: alloy-logs
  egress:
    - toEndpoints:
        - matchLabels: {}
      authentication:
        mode: "required"