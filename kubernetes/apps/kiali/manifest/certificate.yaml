apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: kiali-istio-cert
  namespace: {{ .Release.Namespace }} 
spec:
  secretName: kiali-istio-tls       # name of secret to be created/managed by cert-manager
  dnsNames:
  - kiali.istio.yuriy-lab.cloud
  issuerRef:
    name: letsencrypt-dns
    kind: ClusterIssuer

