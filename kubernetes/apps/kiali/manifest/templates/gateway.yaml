apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: kiali-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: istio
  servers:
    - port:
        number: 443
        name: https
        protocol: HTTPS
      hosts:
        - {{ .Values.kialiGateway.host | default "kiali.istio.yuriy-lab.cloud" }}
      tls:
        mode: SIMPLE
        credentialName: kiali-istio-tls  # References the secret created by cert-manager
