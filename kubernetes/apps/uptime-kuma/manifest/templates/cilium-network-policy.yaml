apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "kuma-network-policy"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: uptime-kuma # Or use {} to allow Gateway to all pods in this NS
  egress:
    # Allow communication to the Envoy Gateway Proxies
    - toEndpoints:
        - matchLabels:
            gateway.envoyproxy.io/owning-gateway-name: main-gateway
            io.kubernetes.pod.namespace: envoy-gateway-system
      authentication:
        mode: "required" # This triggers the SPIRE mTLS check
  ingress:
    - fromEndpoints:
        - matchLabels:
            # Matches the Envoy proxy pods in your gateway namespace
            gateway.envoyproxy.io/owning-gateway-name: main-gateway
            gateway.envoyproxy.io/owning-gateway-namespace: envoy-gateway-system
            io.kubernetes.pod.namespace: envoy-gateway-system
      authentication:
        mode: "required" # This triggers the SPIRE mTLS check
      toPorts:
        - ports:
            - port: "3001"
              protocol: TCP
