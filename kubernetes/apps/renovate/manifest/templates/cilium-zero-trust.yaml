# 1. BASELINE: Global Default Deny (Ingress & Egress)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "zero-trust-baseline"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {} # Target ALL pods in the namespace
  # Default deny ingress
  ingress: []
  # Egress Lockdown: Deny all internet, allow ONLY internal DNS
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: renovate-github-lockdown
  namespace: {{ .Release.Namespace | default "renovate" }}
spec:
  endpointSelector:
    matchLabels:
      app: renovate-daily-helm-scan
  # Allow only DNS + GitHub egress
  egress:
    # HTTPS to GitHub
    - toFQDNs:
        - matchPattern: "*"
        #- matchName: "github.com"
        #- matchPattern: "*.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
