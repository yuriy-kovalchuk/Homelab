apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: renovate-network-policy
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app: renovate-daily-helm-scan
  egress:
    - toFQDNs:
        - matchPattern: "*"
        #- matchName: "github.com"
        #- matchPattern: "*.githubusercontent.com"
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
