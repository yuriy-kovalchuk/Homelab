apiVersion: batch/v1
kind: CronJob
metadata:
  name: renovate-daily-helm-scan
  namespace: {{ .Release.Namespace | default "renovate" }}
spec:
  schedule: {{ .Values.schedule }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            fsGroup: 10001
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: renovate-config-volume
              configMap:
                name: renovate-config
          containers:
            - name: renovate
              image: {{ .Values.image }}
              args:
                - "--dry-run=null"
              env:
                - name: RENOVATE_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: renovate-secret
                      key: token
                - name: RENOVATE_CONFIG_FILE
                  value: /usr/src/app/config.json
                - name: PLATFORM_NAME
                  value: github
              volumeMounts:
                - name: renovate-config-volume
                  mountPath: /usr/src/app/config.json
                  subPath: config.json
              securityContext:
                allowPrivilegeEscalation: false
                capabilities:
                  drop:
                    - ALL
                runAsNonRoot: true
                readOnlyRootFilesystem: true
              resources:
                limits:
                  cpu: "100m"
                  memory: "512Mi"
                requests:
                  cpu: "50m"
                  memory: "64Mi"