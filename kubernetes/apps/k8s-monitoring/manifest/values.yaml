yk:
  ciliumNetworkPolicies:
    - policyName: allow-egress-to-kube-api-server
      type: namespaced
      endpointSelector:
        {}
      egress:
        - toEntities:
            - host
            - remote-node

    - policyName: allow-egress-to-loki
      type: namespaced
      endpointSelector:
        matchLabels:
          app.kubernetes.io/instance: k8s-monitoring-alloy-logs
          app.kubernetes.io/name: alloy-logs
      egress:
        - toEndpoints:
            - matchLabels:
                app.kubernetes.io/instance: loki
                app.kubernetes.io/component: gateway
                io.kubernetes.pod.namespace: loki

    - policyName: allow-egress-opencost-to-mimir
      type: namespaced
      endpointSelector:
        matchLabels:
          app.kubernetes.io/name: opencost
      egress:
        - toEndpoints:
            - matchLabels:
                io.kubernetes.pod.namespace: mimir


  httpRoutes:
    - parentRefs:
        - name: main-gateway
          namespace: envoy-gateway-system
      name: alloy
      securityPolicy: true
      hostnames:
        - "alloy.yuriy-lab.cloud"
      path:
        type: PathPrefix
        value: /
      backend:
        name: k8s-monitoring-alloy-metrics-cluster
        port: 12345

k8s-monitoring:

  global:
    scrapeInterval: 15s

  cluster:
    name: homelab-cluster

  destinations:
    - name: loki
      type: loki
      url: http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push
    - name: mimir
      type: prometheus
      url: http://mimir-distributor.mimir.svc.cluster.local:8080/api/v1/push


  clusterMetrics:
    enabled: true

    kube-state-metrics:
      enabled: true
      metricsTuning:
        includeMetrics:
          - kube_namespace_created

    node-exporter:
      metricsTuning:
        # Will filter to the metrics that will populate the Linux node integration
        # See https://grafana.com/docs/grafana-cloud/monitor-infrastructure/integrations/integration-reference/integration-linux-node/
        useIntegrationAllowList: true
        includeMetrics:
          - node_pressure_cpu_waiting_seconds_total
          - node_pressure_memory_waiting_seconds_total
          - node_pressure_io_waiting_seconds_total
          - node_pressure_irq_stalled_seconds_total
    kubelet:
      metricsTuning:
        useDefaultAllowList: true
        includeMetrics:
          - kubelet_node_name
          - kubernetes_build_info
          -
    cadvisor:
      metricsTuning:
        # Will keep the default set of metrics and also include these three more
        useDefaultAllowList: true
        includeMetrics:
          - container_memory_cache
          - container_memory_rss
          - container_memory_swap
          - container_spec_memory_limit_bytes
          - machine_cpu_cores
          - container_cpu_cfs_throttled_seconds_total
          - container_oom_events_total
          - container_spec_cpu_quota
    controlPlane:
      enabled: true

    kubeControllerManager:
      enabled: true

    kubeDNS:
      enabled: true

    kubeScheduler:
      enabled: true

    windows-exporter:
      enabled: false
      deploy: false

    opencost:
      enabled: false
      metricsSource: mimir
      opencost:
        ui:
          enabled: true
        prometheus:
          external:
            url: http://mimir-query-frontend.mimir.svc.cluster.local:8080/prometheus
        exporter:
          defaultClusterId: homelab-cluster
          extraEnv:
            PROMETHEUS_HEADER_X_SCOPE_ORGID: "anonymous"

    kepler:
      enabled: false
      metricsTuning:
        # Will keep the default set of metrics and also include these three more
        useDefaultAllowList: true
        includeMetrics:
          - kepler_node_cpu_active_joules_total
          - kepler_node_cpu_active_watts
          - kepler_node_cpu_idle_joules_total
          - kepler_node_cpu_idle_watts
          - kepler_node_cpu_info
          - kepler_node_cpu_joules_total
          - kepler_node_cpu_usage_ratio
          - kepler_node_cpu_watts
          - kepler_container_cpu_joules_total
          - kepler_container_cpu_watts
          - kepler_process_cpu_joules_total
          - kepler_process_cpu_seconds_total
          - kepler_process_cpu_watts
          - kepler_vm_cpu_joules_total
          - kepler_vm_cpu_watts
          - kepler_pod_cpu_joules_total
          - kepler_pod_cpu_watts
          - kepler_build_info

  clusterEvents:
    enabled: true
    collector: alloy-logs
    namespaces: []
    destinations:
      - loki

  nodeLogs:
    enabled: false

  podLogs:
    enabled: true
    gatherMethod: volumes
    collector: alloy-logs
    labelsToKeep: ["app_kubernetes_io_name","container","instance","job","level","namespace","service_name","service_namespace","deployment_environment","deployment_environment_name"]
    structuredMetadata:
      pod: pod  # Set structured metadata "pod" from label "pod"
    namespaces: []

  alloy-logs:
    enabled: true
    alloy:
      mounts:
        varlog: true
        dockercontainers: false
      clustering:
        enabled: true

  autoInstrumentation:
    enabled: false

  annotationAutodiscovery:
    enabled: true

  prometheusOperatorObjects:
    enabled: true

  alloy-singleton:
    enabled: false

  alloy-metrics:
    enabled: true

  alloy-profiles:
    enabled: false

  alloy-receiver:
    enabled: false

  integrations:
    destinations: []
    collector: alloy-metrics

    node_exporter:
      enabled: true
