apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-health-checks"
  namespace: {{ .Release.Namespace }}
spec:
  description: "Allow Alloy logs"
  endpointSelector: {}
  ingress:
    - fromEntities:
        - host        # Allows Kubelet on the same node
        - remote-node # Allows Kubelet/probes from other nodes