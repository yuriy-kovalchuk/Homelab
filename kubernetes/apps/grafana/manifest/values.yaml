grafana:

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Mimir
          type: prometheus
          uid: mimir-metrics
          access: proxy
          url: http://mimir-query-frontend.mimir.svc.cluster.local:8080
          isDefault: true
          version: 1
          editable: true
          jsonData:
          # This assumes you have not enabled authentication or a custom tenant ID yet.
          # If you use the single-binary Mimir install, you might need a header:
           httpHeaderName1: X-Scope-OrgID
           httpHeaderValue1: "tenant-id"