grafana:

  datasources:
    datasources.yaml:
      apiVersion: 1
      datasources:
        - name: Mimir
          type: prometheus
          uid: mimir-metrics
          access: proxy
          url: http://mimir-query-frontend.mimir.svc.cluster.local:8080/prometheus
          isDefault: true
          version: 1
          editable: true
          jsonData:
           httpHeaderName1: X-Scope-OrgID
          secureJsonData:
            httpHeaderValue1: "1"
