yk:
  httpRoute:
    parentRefs:
      - name: main-gateway
        namespace: envoy-gateway-system
    hostnames:
      - "portainer.yuriy-lab.cloud"
    path:
      type: PathPrefix
      value: /
    backend:
      name: portainer
      port: 9000


portainer:
  service:
    type: ClusterIP

  persistence:
    size: 1Gi
  
  tls:
    force: false

  image:
    tag: lts

  feature:
    flags:
      - "-http-enabled"

  resources:
    requests:
      cpu: 10m
      memory: 128Mi
    limits:
      cpu: 50m
      memory: 512Mi