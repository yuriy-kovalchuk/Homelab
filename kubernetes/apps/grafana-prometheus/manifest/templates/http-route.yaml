{{- range .Values.yk.httpRoutes }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ $.Release.Name }}-route
  namespace: {{ $.Release.Namespace }}
spec:
  parentRefs:
  {{- range .parentRefs }}
  - name: {{ .name }}
    namespace: {{ .namespace }}
  {{- end }}
  hostnames:
  {{- range .hostnames }}
  - {{ . | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: {{ .path.type | default "PathPrefix" }}
            value: {{ .path.value | default "/" }}
      backendRefs:
        - name: {{ .backend.name }}
          port: {{ .backend.port }}
---
{{- end }}