kube-prometheus-stack:
  defaultRules:
    rules:
      kubeApiserverBurnrate: false
      kubeApiserverSlos: false
      kubeControllerManager: false
      kubeSchedulerAlerting: false
      nodeExporterAlerting: false
      windows: false

  prometheus-windows-exporter:
    prometheus:
      monitor:
        enabled: false

  alertmanager:
    enabled: true
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        "cert-manager.io/cluster-issuer": "letsencrypt-dns"
      hosts:
        - alertmanager.yuriy-lab.cloud
      paths:
        - /
      tls:
        - secretName: alertmanager-general-tls
          hosts:
            - alertmanager.yuriy-lab.cloud
    alertmanagerSpec:
      storage:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 5Gi

  grafana:
    grafana.ini:
      server:
        protocol: http
        domain: grafana.yuriy-lab.cloud
        root_url: https://grafana.yuriy-lab.cloud
        serve_from_sub_path: false
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        "cert-manager.io/cluster-issuer": "letsencrypt-dns"
      hosts:
        - grafana.yuriy-lab.cloud
      tls:
        - secretName: grafana-general-tls
          hosts:
            - grafana.yuriy-lab.cloud
    persistence:
      enabled: true
      type: sts
      accessModes:
        - ReadWriteOnce
      size: 1Gi
      finalizers:
        - kubernetes.io/pvc-protection

  kubeControllerManager:
    endpoints:
      - 10.0.8.2
      - 10.0.8.3
      - 10.0.8.4
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  coreDns:
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  kubeDns:
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  kubeEtcd:
    endpoints:
      - 10.0.8.2
      - 10.0.8.3
      - 10.0.8.4
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  kubeScheduler:
    endpoints:
      - 10.0.8.2
      - 10.0.8.3
      - 10.0.8.4
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  kubeProxy:
    enabled: false
    endpoints:
      - 10.0.8.2
      - 10.0.8.3
      - 10.0.8.4
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  nodeExporter:
    operatingSystems:
      aix:
        enabled: false
      darwin:
        enabled: false

  prometheus-node-exporter:
    extraArgs:
      - --collector.hwmon
      - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
      - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs)$
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  prometheusOperator:
    admissionWebhooks:
      deployment:
        service:
          ipDualStack:
            ipFamilies: ["IPv4"]
            ipFamilyPolicy: "SingleStack"
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"

  prometheus:
    service:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"
    servicePerReplica:
      ipDualStack:
        ipFamilies: ["IPv4"]
        ipFamilyPolicy: "SingleStack"
    ingress:
      enabled: true
      ingressClassName: nginx
      annotations:
        "cert-manager.io/cluster-issuer": "letsencrypt-dns"
      hosts:
        - prometheus.yuriy-lab.cloud
      paths:
        - /
      tls:
        - secretName: prometheus-general-tls
          hosts:
            - prometheus.yuriy-lab.cloud
    prometheusSpec:
      remoteWrite:
        - url: http://mimir-nginx.mimir.svc.cluster.local/api/v1/push
          writeRelabelConfigs:
            # Convert all dots to underscores in metric names
            - sourceLabels: [ __name__ ]
              regex: '([^.]+)\.(.+)'
              targetLabel: __name__
              replacement: '${1}_${2}'
              action: replace
          # If using distributed Mimir, use the gateway/nginx endpoint
          # Adjust the namespace if Mimir is in a different one

          # Optional: Add basic auth if configured
          # basicAuth:
          #   username:
          #     name: mimir-credentials
          #     key: username
          #   password:
          #     name: mimir-credentials
          #     key: password

          # Optional: Add headers for multi-tenancy
          # headers:
          #   X-Scope-OrgID: tenant-1

          # Recommended queue configuration
          queueConfig:
            capacity: 10000
            maxShards: 50
            minShards: 1
            maxSamplesPerSend: 5000
            batchSendDeadline: 5s
            minBackoff: 30ms
            maxBackoff: 5s

          # Write relabel configs (optional - for filtering/modifying metrics)
          # writeRelabelConfigs:
          #   - sourceLabels: [__name__]
          #     regex: 'expensive_metric_.*'
          #     action: drop

      # Optional: Configure remote read from Mimir
      # remoteRead:
      #   - url: http://mimir-nginx.mimir.svc.cluster.local/prometheus
      #     readRecent: true

      # Retention - you can reduce local retention since data is in Mimir
      retention: 1h  # Keep only 1 hours locally
      serviceMonitorSelectorNilUsesHelmValues: false
      storageSpec:
        volumeClaimTemplate:
          spec:
            storageClassName: longhorn
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 2Gi


  extraManifests:
    - apiVersion: v1
      kind: Namespace
      metadata:
        name: monitoring
        labels:
          pod-security.kubernetes.io/enforce: privileged
          pod-security.kubernetes.io/audit: privileged
          pod-security.kubernetes.io/warn: privileged