---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
    name: grafana-prometheus
    namespace: argo-cd
spec:
    project: infrastructure
    source:
      repoURL: git@github.com:yuriy-kovalchuk/Homelab.git
      targetRevision: HEAD
      path: kubernetes/apps/grafana-prometheus/manifest
      helm:
        releaseName: grafana-prometheus
    destination:
        server: https://kubernetes.default.svc
        namespace: monitoring
    syncPolicy:
        automated:
            selfHeal: true
            prune: true
        syncOptions:
            - CreateNamespace=true
            - ServerSideApply=true

