# 1. BASELINE: Global Default Deny (Ingress & Egress)
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "zero-trust-baseline"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {} # Target ALL pods in the namespace
  # Egress Lockdown: Deny all internet, allow ONLY internal DNS
  egress:
    - toEndpoints:
        - matchLabels:
            "k8s:io.kubernetes.pod.namespace": kube-system
            "k8s:k8s-app": kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
          rules:
            dns:
              - matchPattern: "*"
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "allow-health-checks"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector: {} # Apply to all pods in the namespace
  ingress:
    - fromEntities:
        - host        # Allows Kubelet on the same node
        - remote-node # Allows Kubelet/probes from other nodes
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
apiVersion: "cilium.io/v2"
kind: CiliumNetworkPolicy
metadata:
  name: "trivy-adapter-api-access"
  namespace: {{ .Release.Namespace }}
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: trivy-operator-polr-adapter
  egress:
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP