apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: rancher                # Name of the Argo CD app (visible in Argo CD UI)
  namespace: argo-cd            # Namespace where Argo CD is installed
spec:
  project: rancher             # Argo CD project; "default" if you're not using custom projects
  source:
    repoURL: https://releases.rancher.com/server-charts/stable  # Helm repo URL
    chart: rancher             # The name of the Helm chart in that repo
    targetRevision: latest     # Chart version to deploy ("latest", or pin a version like "2.7.5")
    helm:
      valueFiles:
        - values/values.yaml   # Custom Helm values file (only works if using Git repo)
  destination:
    server: https://kubernetes.default.svc   # Kubernetes cluster to deploy to
    namespace: rancher                # Namespace where Rancher will be installed
  syncPolicy:
    automated:                         # Enables auto-sync (GitOps!)
      selfHeal: true                   # Auto-correct drift between live & desired state
      prune: true                      # Remove resources that are no longer in Git
