loki:
  loki:
    config:
      schema_config:
        configs:
          - from: 2020-10-24
            store: boltdb-shipper
            object_store: s3
            schema: v11
            index:
              prefix: index_
              period: 168h
    storage:
      type: s3
      s3:
        endpoint: http://minio.minio-dev.svc.cluster.local:9000
        bucketNames:
          chunks: loki-chunks
          index: loki-index
        access_key_id: minioadmin
        secret_access_key: minioadmin
        insecure: true

    ingester:
      chunk_encoding: snappy
    querier:
      # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
      max_concurrent: 4
    pattern_ingester:
      enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true


  deploymentMode: Distributed

  ingester:
    replicas: 2 # To ensure data durability with replication
    zoneAwareReplication:
      enabled: false
  querier:
    replicas: 2 # Improve query performance via parallelism
    maxUnavailable: 1
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
  queryScheduler:
    replicas: 2
  distributor:
    replicas: 2
    maxUnavailable: 1
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
    maxUnavailable: 1

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  singleBinary:
    replicas: 0

    # This exposes the Loki gateway so it can be written to and queried externaly
  gateway:
    service:
      type: LoadBalancer


  minio:
    enabled: false