loki:
  loki:
    auth_enabled: false
    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ingester:
      chunk_encoding: snappy
    querier:
      # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
      max_concurrent: 4
    pattern_ingester:
      enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true


  deploymentMode: Distributed

  ingester:
    replicas: 2 # To ensure data durability with replication
    zoneAwareReplication:
      enabled: false
  querier:
    replicas: 2 # Improve query performance via parallelism
    maxUnavailable: 1
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
  queryScheduler:
    replicas: 2
  distributor:
    replicas: 2
    maxUnavailable: 1
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
    maxUnavailable: 1

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  singleBinary:
    replicas: 0

  # Enable minio for storage
  minio:
    enabled: true
    image:
      repository: quay.io/minio/minio
      tag: RELEASE.2025-07-18T21-56-31Z-cpuv1
      pullPolicy: IfNotPresent
    mcImage:
      repository: quay.io/minio/mc
      tag: RELEASE.2024-11-21T17-21-54Z-cpuv1
      pullPolicy: IfNotPresent
    persistence:
      size: 1G

#https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring/charts/
k8s-monitoring:
  cluster:
    name: homelab-cluster

  destinations:
    - name: loki
      type: loki
      url: http://loki-gateway/loki/api/v1/push


  clusterEvents:
    enabled: true
    collector: alloy-logs
    namespaces:
      - "*"

  nodeLogs:
    enabled: false

  podLogs:
    enabled: true
    gatherMethod: kubernetesApi
    collector: alloy-logs
    labelsToKeep: ["app_kubernetes_io_name","container","instance","job","level","namespace","service_name","service_namespace","deployment_environment","deployment_environment_name"]
    structuredMetadata:
      pod: pod  # Set structured metadata "pod" from label "pod"
    namespaces:
      - "*"


  # Collectors
  alloy-singleton:
    enabled: false

  alloy-metrics:
    enabled: false

  alloy-logs:
    enabled: true
    alloy:
      mounts:
        varlog: false
        dockercontainers: false
      clustering:
        enabled: true

  alloy-profiles:
    enabled: false

  alloy-receiver:
    enabled: false


