loki:
  loki:

    storage:
      type: "s3"
      s3:
        endpoint: http://minio-svc.minio:9000
        region: eu-south-1
        s3ForcePathStyle: true
        accessKeyId: "${S3_ACCESS_KEY}"
        secretAccessKey: "${S3_SECRET_KEY}"
      bucketNames:
        chunks: "loki-chunks"
        ruler: "loki-ruler"
        admin: "loki-admin"

    schemaConfig:
      configs:
        - from: "2024-04-01"
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    ingester:
      chunk_encoding: snappy
    querier:
      # Default is 4, if you have enough memory and CPU you can increase, reduce if OOMing
      max_concurrent: 4
    pattern_ingester:
      enabled: true
    limits_config:
      allow_structured_metadata: true
      volume_enabled: true


  deploymentMode: Distributed

  ingester:
    replicas: 2 # To ensure data durability with replication
    zoneAwareReplication:
      enabled: false
  querier:
    replicas: 2 # Improve query performance via parallelism
    maxUnavailable: 1
  queryFrontend:
    replicas: 2
    maxUnavailable: 1
  queryScheduler:
    replicas: 2
  distributor:
    replicas: 2
    maxUnavailable: 1
  compactor:
    replicas: 1
  indexGateway:
    replicas: 2
    maxUnavailable: 1

  bloomPlanner:
    replicas: 0
  bloomBuilder:
    replicas: 0
  bloomGateway:
    replicas: 0

  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

  singleBinary:
    replicas: 0

#https://github.com/grafana/k8s-monitoring-helm/tree/main/charts/k8s-monitoring/charts/
k8s-monitoring:
  cluster:
    name: homelab-cluster

  destinations:
    - name: loki
      type: loki
      url: http://loki-gateway/loki/api/v1/push


  clusterEvents:
    enabled: true
    collector: alloy-logs
    namespaces: []

  nodeLogs:
    enabled: false

  podLogs:
    enabled: true
    gatherMethod: kubernetesApi
    collector: alloy-logs
    labelsToKeep: ["app_kubernetes_io_name","container","instance","job","level","namespace","service_name","service_namespace","deployment_environment","deployment_environment_name"]
    structuredMetadata:
      pod: pod  # Set structured metadata "pod" from label "pod"
    namespaces: []

  # Collectors
  alloy-singleton:
    enabled: false

  alloy-metrics:
    enabled: false

  alloy-logs:
    enabled: true
    alloy:
      mounts:
        varlog: false
        dockercontainers: false
      clustering:
        enabled: true

  alloy-profiles:
    enabled: false

  alloy-receiver:
    enabled: false


  extraEnv:
    - name: S3_ACCESS_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3-secret
          key: accessKeyId
    - name: S3_SECRET_KEY
      valueFrom:
        secretKeyRef:
          name: loki-s3-secret
          key: secretAccessKey
