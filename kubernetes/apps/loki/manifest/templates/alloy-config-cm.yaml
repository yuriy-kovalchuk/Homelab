apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: loki
data:
  config.alloy: |
    # Discover all pods in the cluster.
    discovery.kubernetes "pods" {
      role = "pod"
    }
    

    discovery.kubernetes "nodes" {
      role = "node"
    }
  
    discovery.kubernetes "services" {
      role = "service"
    }
  
    discovery.kubernetes "endpoints" {
      role = "endpoints"
    }
  
    discovery.kubernetes "endpointslices" {
      role = "endpointslice"
    }
  
    discovery.kubernetes "ingresses" {
      role = "ingress"
    }

    # Relabel the pods to create new labels for the logs.
    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      # Create a "namespace" label from the pod's namespace metadata.
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }

      # Create a "pod" label from the pod's name metadata.
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }

      # Create a "container" label from the container's name metadata.
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }

      # Create a "job" label that combines the namespace and pod name.
      rule {
        source_labels = ["__meta_kubernetes_namespace", "__meta_kubernetes_pod_name"]
        separator     = "/"
        target_label  = "job"
      }

      # Set the __path__ to the log file on the node's filesystem.
      rule {
        source_labels = ["__meta_kubernetes_pod_uid", "__meta_kubernetes_pod_container_name"]
        separator     = "/"
        action        = "replace"
        replacement   = "/var/log/pods/*$1/*.log"
        target_label  = "__path__"
      }
    }

    # Match the discovered paths to actual files.
    local.file_match "pod_logs" {
      path_targets = discovery.relabel.pod_logs.output
    }

    # Tail the log files and forward them.
    loki.source.file "pod_logs" {
      targets     = local.file_match.pod_logs.targets
      forward_to  = [loki.write.loki.receiver]
    }

    # Send the logs to Loki.
    loki.write "loki" {
      endpoint {
        # Use the Loki service URL.
        # Replace <your-loki-namespace> with your Loki namespace.
        url = "http://loki-gateway/loki/api/v1/push"
      }
    }