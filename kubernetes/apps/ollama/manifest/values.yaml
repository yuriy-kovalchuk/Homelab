# Umbrella chart values for open-webui
# All values are nested under open-webui: as it's a dependency

open-webui:
  # Disable pipelines - not needed for basic Ollama usage
  # Pipelines extends Open WebUI with custom processing workflows,
  # external integrations, and RAG capabilities. Disable if not using these features.
  pipelines:
    enabled: false

  # Ollama configuration
  ollama:
    enabled: true
    fullnameOverride: "ollama"
    # Models will be copied from existing PVC manually
    persistentVolume:
      enabled: true
      size: 300Gi

    # Vulkan / AMD GPU passthrough
    ollama:
      gpu:
        enabled: true
        type: "amd"
        number: 1

    extraEnv:
      - name: HSA_OVERRIDE_GFX_VERSION
        value: "11.0.0"
      - name: HSA_ENABLE_SDMA
        value: "0"
      - name: OLLAMA_DEBUG
        value: "1"
      - name: OLLAMA_VULKAN
        value: "1"

    volumes:
      - name: dev-gpu
        hostPath:
          path: /dev/dri
          type: Directory
      - name: dev-kfd
        hostPath:
          path: /dev/kfd
          type: CharDevice
      - name: sys-bus-pci
        hostPath:
          path: /sys/bus/pci
          type: Directory
      - name: sys-class-kfd
        hostPath:
          path: /sys/class/kfd
          type: Directory

    volumeMounts:
      - name: dev-gpu
        mountPath: /dev/dri
        readOnly: true
      - name: dev-kfd
        mountPath: /dev/kfd
        readOnly: true
      - name: sys-bus-pci
        mountPath: /sys/bus/pci
        readOnly: true
      - name: sys-class-kfd
        mountPath: /sys/class/kfd
        readOnly: true

    securityContext:
      privileged: true
      runAsUser: 0
      capabilities:
        add:
          - SYS_PTRACE

    nodeSelector:
      kubernetes.io/hostname: yulia

  # Websocket configuration with hardened Redis
  websocket:
    enabled: true
    manager: redis
    redis:
      enabled: true
      containerSecurityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        allowPrivilegeEscalation: false
        readOnlyRootFilesystem: true
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
      podSecurityContext:
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999



  # Pod security context - applied at pod level
  # Note: Open WebUI image requires root to write to /app/backend/open_webui/static/
  podSecurityContext:
    fsGroup: 1000
    fsGroupChangePolicy: OnRootMismatch

  # Container security context
  # Limited hardening - Open WebUI writes to its app directory at startup
  containerSecurityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault

  # Persistence for Open WebUI data
  persistence:
    enabled: true
    size: 2Gi

  # Service configuration
  service:
    type: ClusterIP
    port: 80
    containerPort: 8080

  # Provide secret key to avoid permission issues with non-root user
  # The startup script tries to write .webui_secret_key which fails without write access
  extraEnvVars:
    - name: WEBUI_SECRET_KEY
      value: "3eb57978a4bcfa8a92c8997b067c9f13718206b09f70e2022dd84328693b6121"
    # Disable features that download models from internet at startup
    - name: RAG_EMBEDDING_ENGINE
      value: "ollama"
    - name: ENABLE_RAG_WEB_SEARCH
      value: "false"
    - name: ENABLE_RAG_HYBRID_SEARCH
      value: "false"
    # Skip embedding model download - use Ollama for embeddings instead
    - name: RAG_EMBEDDING_MODEL
      value: ""
    - name: RAG_RERANKING_MODEL
      value: ""
