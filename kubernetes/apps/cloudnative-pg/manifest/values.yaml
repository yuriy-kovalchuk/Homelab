yk:
  ciliumNetworkPolicies:
    - policyName: allow-egress-to-kube-api-server
      endpointSelector:
        matchLabels:
          app.kubernetes.io/name: cloudnative-pg
      egress:
        - toEntities:
            - kube-apiserver
            - remote-node
            - host
          toPorts:
            - ports:
                - port: "6443"
                  protocol: TCP




cloudnative-pg:

  resources:
    limits:
      cpu: 100m
      memory: 200Mi
    requests:
      cpu: 10m
      memory: 100Mi

  monitoring:
    podMonitorEnabled: true
    grafanaDashboard:
      create: true
