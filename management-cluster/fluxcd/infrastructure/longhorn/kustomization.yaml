apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - helm-repository.yaml
  - helm-release.yaml


namespace: longhorn-system

configMapGenerator:
  - name: longhorn-values
    files:
      - configs/values.yaml

generatorOptions:
  disableNameSuffixHash: true
