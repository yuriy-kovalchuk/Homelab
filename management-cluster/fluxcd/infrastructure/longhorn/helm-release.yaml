apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.11.1"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
  install:
    createNamespace: false
  values:
    networkpolicies:
      enabled: false
    longhornui:
      replicas: 1
    httproute:
      enabled: true
      parentRefs:
        - name: internal
          namespace: kube-system
          group: gateway.networking.k8s.io
          kind: Gateway
          sectionName: https-longhorn
      hostnames:
        - longhorn-mgmt.yuriy-lab.cloud
