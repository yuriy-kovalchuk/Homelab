    apiVersion: gateway.networking.k8s.io/v1
    kind: Gateway
    metadata:
      name: internal
      namespace: kube-system
      annotations:
        cert-manager.io/cluster-issuer: letsencrypt-dns
    spec:
      gatewayClassName: cilium
      addresses:
        - type: IPAddress
          value: "10.2.0.10"
      listeners:
        - name: http
          port: 80
          protocol: HTTP
          allowedRoutes:
            namespaces:
              from: All
        - name: https-longhorn
          port: 443
          protocol: HTTPS
          hostname: "longhorn-mgmt.yuriy-lab.cloud"
          tls:
            mode: Terminate
            certificateRefs:
              - name: longhorn-gw-tls
                kind: Secret
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  kubernetes.io/metadata.name: "longhorn-system"
        - name: https-harbor
          port: 443
          protocol: HTTPS
          hostname: "harbor-mgmt.yuriy-lab.cloud"
          tls:
            mode: Terminate
            certificateRefs:
              - name: harbor-gw-tls
                kind: Secret
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  kubernetes.io/metadata.name: "harbor"
        - name: https-vault
          port: 443
          protocol: HTTPS
          hostname: "vault-mgmt.yuriy-lab.cloud"
          tls:
            mode: Terminate
            certificateRefs:
              - name: vault-gw-tls
                kind: Secret
          allowedRoutes:
            namespaces:
              from: Selector
              selector:
                matchLabels:
                  kubernetes.io/metadata.name: "vault"
