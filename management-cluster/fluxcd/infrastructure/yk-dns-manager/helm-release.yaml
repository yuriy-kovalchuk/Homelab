apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: yk-dns-manager
  namespace: yk-dns-manager
spec:
  interval: 30m
  chartRef:
    kind: OCIRepository
    name: yk-dns-manager
    namespace: yk-dns-manager
  install:
    createNamespace: false
  values:
    domainMap:
      "*.yuriy-lab.cloud": "10.2.0.10"
    dnsProvider:
      provider: opnsense
      upsert: false
      settings:
        base_url: "https://o.yuriy-lab.cloud/api"
        skip_tls_verify: "false"
        default_ttl: "300"
      existingSecret: "dns-manager-provider-credentials"
    metrics:
      service:
        port: 9090
    serviceMonitor:
      enabled: false
      interval: 30s
      namespace: ""
    podSecurityContext:
      runAsNonRoot: true
      runAsUser: 65532
      runAsGroup: 65532
      fsGroup: 65532
      seccompProfile:
        type: RuntimeDefault
    securityContext:
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop:
          - ALL
    livenessProbe:
      httpGet:
        path: /healthz
        port: 8081
      initialDelaySeconds: 5
      periodSeconds: 10
    readinessProbe:
      httpGet:
        path: /readyz
        port: 8081
      initialDelaySeconds: 5
      periodSeconds: 5
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 200m
        memory: 128Mi
