apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
  install:
    createNamespace: false
  values:
    server:
      standalone:
        enabled: true
      dataStorage:
        enabled: true
        size: 5Gi
      auditStorage:
        enabled: true
        size: 1Gi
      extraInitContainers:
        - name: vault-unseal
          image: hashicorp/vault:1.21.2
          command: ["/bin/sh", "/vault/unseal.sh"]
          env:
            - name: UNSEAL_KEY
              valueFrom:
                secretKeyRef:
                  name: vault-unseal-key
                  key: unseal-key
          volumeMounts:
            - name: vault-unseal-script
              mountPath: /vault
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
      volumes:
        - name: vault-unseal-script
          configMap:
            name: vault-unseal-script
            defaultMode: 755
    ui:
      enabled: true
      serviceType: ClusterIP
    injector:
      enabled: false
