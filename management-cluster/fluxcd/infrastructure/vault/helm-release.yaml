apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vault
  namespace: vault
spec:
  interval: 30m
  chart:
    spec:
      chart: vault
      version: "0.32.0"
      sourceRef:
        kind: HelmRepository
        name: hashicorp
        namespace: vault
  install:
    createNamespace: false
  values:
    server:
      standalone:
        enabled: true
      dataStorage:
        enabled: true
        size: 5Gi
      auditStorage:
        enabled: true
        size: 1Gi
    ui:
      enabled: true
      serviceType: ClusterIP
    injector:
      enabled: false
