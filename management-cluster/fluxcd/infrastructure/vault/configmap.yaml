apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-unseal-script
  namespace: vault
data:
  unseal.sh: |
    #!/bin/sh
    set -e

    apk add --no-cache curl > /dev/null 2>&1

    UNSEAL_KEY="${UNSEAL_KEY}"
    VAULT_ADDR="http://localhost:8200"

    if [ -z "$UNSEAL_KEY" ]; then
        echo "ERROR: UNSEAL_KEY not set"
        exit 1
    fi

    echo "Waiting for Vault to be ready..."
    until curl -s "$VAULT_ADDR/v1/sys/health" > /dev/null 2>&1; do
      sleep 2
    done

    seal_status=$(curl -s "$VAULT_ADDR/v1/sys/health" | grep -o '"seal_status":"[^"]*"' | cut -d'"' -f4)

    if [ "$seal_status" = "unsealed" ]; then
      echo "Vault is already unsealed"
      exit 0
    fi

    echo "Unsealing Vault via API..."
    curl -X POST "$VAULT_ADDR/v1/sys/unseal" \
      -H "Content-Type: application/json" \
      -d "{\"key\": \"$UNSEAL_KEY\"}"

    echo "Waiting for Vault to become unsealed..."
    until [ "$(curl -s "$VAULT_ADDR/v1/sys/health" | grep -o '"sealed":[^,]*' | cut -d':' -f2 | tr -d ' ')" = "false" ]; do
      sleep 2
    done

    echo "Vault unsealed successfully"