apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: vault-ui
  namespace: vault
spec:
  parentRefs:
    - name: internal
      namespace: kube-system
      group: gateway.networking.k8s.io
      kind: Gateway
      sectionName: https-vault
  hostnames:
    - vault-mgmt.yuriy-lab.cloud
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: vault-ui
          port: 8200
