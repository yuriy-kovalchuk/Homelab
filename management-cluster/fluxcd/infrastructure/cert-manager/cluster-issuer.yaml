apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-dns
spec:
  acme:
    email: "yuriy.kovalchuk@proton.me"
    server: https://acme-v02.api.letsencrypt.org/directory
    privateKeySecretRef:
      name: letsencrypt-dns-key
    solvers:
      - dns01:
          cloudflare:
            email: "yuriy.kovalchuk@proton.me"
            apiTokenSecretRef:
              name: cloudflare-api-token-secret
              key: api-token
