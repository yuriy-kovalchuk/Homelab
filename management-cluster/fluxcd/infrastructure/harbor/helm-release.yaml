apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: harbor
  namespace: harbor
spec:
  interval: 30m
  chart:
    spec:
      chart: harbor
      version: "1.18.3"
      sourceRef:
        kind: HelmRepository
        name: harbor
        namespace: harbor
  install:
    createNamespace: false
  values:
    expose:
      type: clusterIP
      tls:
        enabled: false
      ingress:
        enabled: false
    externalURL: "https://harbor-mgmt.yuriy-lab.cloud"
    persistence:
      enabled: true
      persistentVolumeClaim:
        registry:
          size: 20Gi
        database:
          size: 1Gi
        redis:
          size: 1Gi
        jobservice:
          size: 1Gi
        trivy:
          size: 5Gi
    trivy:
      enabled: true
    metrics:
      enabled: false
