k8sServiceHost: 10.0.8.2
k8sServicePort: 6443
ipam:
  mode: kubernetes
kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup


l2announcements:
  enabled: true

externalIPs:
  enabled: true

k8sClientRateLimit:
  qps: 50
  burst: 200

operator:
  replicas: 1  # Uncomment this if you only have one node
  rollOutPods: true

rollOutCiliumPods: true

routing-mode: "native"


hubble:
  enabled: true
  relay:
    enabled: true
  ui:
    enabled: true

#cni:
#  exclusive: false # REQUIRED: Allow Istio CNI chaining
#
#socketLB:
#  # REQUIRED: Prevent Cilium from bypassing Istio traffic capture
#  hostNamespaceOnly: true

bpf:
  # REQUIRED: Disable BPF masquerade to allow Istio health checks to pass
  masquerade: true

