k8sServiceHost: 10.0.8.2
k8sServicePort: 6443
ipam:
  mode: kubernetes
kubeProxyReplacement: true

securityContext:
  capabilities:
    ciliumAgent:
      - CHOWN
      - KILL
      - NET_ADMIN
      - NET_RAW
      - IPC_LOCK
      - SYS_ADMIN
      - SYS_RESOURCE
      - DAC_OVERRIDE
      - FOWNER
      - SETGID
      - SETUID
    cleanCiliumState:
      - NET_ADMIN
      - SYS_ADMIN
      - SYS_RESOURCE

cgroup:
  autoMount:
    enabled: false
  hostRoot: /sys/fs/cgroup

l2announcements:
  enabled: true

externalIPs:
  enabled: true

k8sClientRateLimit:
  qps: 50
  burst: 200

operator:
  replicas: 3
  rollOutPods: true
  prometheus:
    enabled: true

rollOutCiliumPods: true

routing-mode: "native"

prometheus:
  enabled: true
  serviceMonitor:
    enabled: true

hubble:
  enabled: true
  metrics:
    enabled:
      - dns:query;ignoreAAAA
      - drop:sourceContext=identity;destinationContext=identity
      - tcp
      - flow
      - icmp
      - 'httpV2:exemplars=true;labelsContext=source_ip,source_namespace,source_workload,destination_ip,destination_namespace,destination_workload,traffic_direction;sourceContext=workload-name|reserved-identity;destinationContext=workload-name|reserved-identity'
    enableOpenMetrics: true
    dashboards:
      enabled: true
      namespace: grafana
      annotations:
        grafana_folder: "Hubble"

  relay:
    enabled: true
  ui:
    enabled: true

#cni:
#  exclusive: false # REQUIRED: Allow Istio CNI chaining
#
#socketLB:
#  # REQUIRED: Prevent Cilium from bypassing Istio traffic capture
#  hostNamespaceOnly: true

bpf:
  # REQUIRED: Disable BPF masquerade to allow Istio health checks to pass
  masquerade: true

