yk:
  httpRoutes:
    - parentRefs:
        - name: main-gateway
          namespace: envoy-gateway-system
      name: hubble
      securityPolicy: true
      hostnames:
        - "hubble.yuriy-lab.cloud"
      path:
        type: PathPrefix
        value: /
      backend:
        name: hubble-ui
        port: 80
