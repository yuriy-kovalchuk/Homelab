gateway:
  service:
    loadBalancerIP: "10.0.8.101"
    externalTrafficPolicy: "Local"

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

istiod:
  profile: ambient
  resources:
    requests:
      cpu: 100m
      memory: 128Mi

cni:
  profile: ambient
  ambient:
    enabled: true

ztunnel:
  logLevel: info


